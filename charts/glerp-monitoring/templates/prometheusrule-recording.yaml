apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-recording-rules
  namespace: {{ .Values.monitoringNamespace }}
  labels:
    {{- include "glerp-monitoring.labels" . | nindent 4 }}
    {{- include "glerp-monitoring.prometheusRuleLabels" . | nindent 4 }}
spec:
  groups:
    - name: glerp.recording.uptime
      interval: 5m
      rules:
        # 3-state health: 2=up, 1=degraded, 0=down
        # Used by the Grafana status grid panel.
        - record: glerp:site_health_state
          expr: |
            (probe_success{job=~"glerp-sites-basic"} == 1) * 2
            - on(site) group_left()
            (
              (probe_success{job="glerp-sites-basic"} == 1)
              * on(site) group_left()
              (probe_success{job="glerp-sites-login"} == 0)
            )

        # 30-day uptime % — login-tier probe is the canonical SLA signal.
        # Both DOWN and DEGRADED states reduce this value.
        - record: glerp:site_uptime_ratio_30d
          expr: |
            avg_over_time(probe_success{job="glerp-sites-login"}[30d]) * 100

        # 30-day degraded ratio — site was reachable but login page was broken.
        - record: glerp:site_degraded_ratio_30d
          expr: |
            avg_over_time(
              (
                (probe_success{job="glerp-sites-basic"} == 1)
                * on(site) group_left()
                (probe_success{job="glerp-sites-login"} == 0)
              )[30d:5m]
            ) * 100

        # 30-day downtime minutes (total minutes where login probe failed).
        - record: glerp:site_downtime_minutes_30d
          expr: |
            (1 - avg_over_time(probe_success{job="glerp-sites-login"}[30d])) * 43200

        # ISP uptime % over 30 days.
        - record: glerp:isp_uptime_ratio_30d
          expr: |
            avg_over_time(
              avg(probe_success{job="internet-connectivity"})[30d:5m]
            ) * 100
