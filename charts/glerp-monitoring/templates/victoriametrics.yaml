{{- if .Values.victoriaMetrics.enabled }}
{{- /*
VictoriaMetrics single-node — long-term storage for GLerp uptime metrics.

Prometheus retains all metrics for only a short window (typically 8-10 days)
to keep cluster disk usage low. VictoriaMetrics receives ONLY the probe metrics
(via Prometheus remoteWrite) and keeps them for 90 days, enabling accurate
30-day SLA calculations without impacting overall Prometheus storage.

The remoteWrite filter is configured in Rancher Monitoring values — see
docs/deployment-guide.md Step 4. Only these job labels are forwarded:
  glerp-sites-basic, glerp-sites-login, glerp-sites-internal, internet-connectivity
*/ -}}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-victoriametrics
  namespace: {{ .Values.monitoringNamespace }}
  labels:
    {{- include "glerp-monitoring.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.victoriaMetrics.storage.size }}
  {{- if .Values.victoriaMetrics.storage.storageClass }}
  storageClassName: {{ .Values.victoriaMetrics.storage.storageClass }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-victoriametrics
  namespace: {{ .Values.monitoringNamespace }}
  labels:
    {{- include "glerp-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoriametrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glerp-monitoring
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: victoriametrics
  strategy:
    type: Recreate   # PVC is ReadWriteOnce — only one pod at a time
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glerp-monitoring
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: victoriametrics
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:{{ .Values.victoriaMetrics.imageTag }}
          args:
            - -storageDataPath=/storage
            - -retentionPeriod={{ .Values.victoriaMetrics.retention }}
            - -httpListenAddr=:8428
            # Only accept remote_write and MetricsQL queries — no scraping
            - -selfScrapeInterval=0
          ports:
            - name: http
              containerPort: 8428
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.victoriaMetrics.resources | nindent 12 }}
          volumeMounts:
            - name: storage
              mountPath: /storage
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-victoriametrics
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-victoriametrics
  namespace: {{ .Values.monitoringNamespace }}
  labels:
    {{- include "glerp-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoriametrics
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8428
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: glerp-monitoring
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: victoriametrics
{{- end }}
