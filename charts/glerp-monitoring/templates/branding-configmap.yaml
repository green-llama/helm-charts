  custom.css: |
    /* Green Llama Security Portal — brand overrides for filebrowser */
    :root {
      --primary: #27B093;
      --primaryText: #ffffff;
    }
    /* Header / navbar background — Navy brand color */
    header#header, nav.header, .topbar, #header {
      background-color: #072B31 !important;
    }
    /* Ensure logo renders at a reasonable size in the header */
    #header img[src*="logo"], header img[src*="logo"] {
      max-height: 36px;
      width: auto;
    }
    /* Sidebar active state uses primary color */
    nav li.active a { color: #27B093 !important; }
    nav li a:hover   { color: #27B093 !important; }
