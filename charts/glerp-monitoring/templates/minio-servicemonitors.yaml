{{- /*
Single cluster-wide PodMonitor that auto-discovers all MinIO Tenant pods
across every namespace using the v1.min.io/tenant label set by MinIO Operator.

PREREQUISITE: Each MinIO Tenant must have MINIO_PROMETHEUS_AUTH_TYPE=public set.
Patch command (one-time per tenant):
  kubectl patch tenant <TENANT_NAME> -n <NAMESPACE> \
    --type=json \
    -p '[{"op":"add","path":"/spec/env/-","value":{"name":"MINIO_PROMETHEUS_AUTH_TYPE","value":"public"}}]'

Once patched, Prometheus discovers and scrapes the tenant within ~60 seconds.
No values.yaml change required — customers do NOT need to be listed in the
customers[] array for MinIO metrics to be collected.

If scrape targets show as DOWN with "port not found", verify the port name:
  kubectl get pod -n <namespace> -l v1.min.io/tenant=<tenant-name> \
    -o jsonpath='{.items[0].spec.containers[*].ports}'
Confirmed port name for MinIO Operator v5: minio-port (9000).
*/ -}}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ .Release.Name }}-minio-tenants
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "glerp-monitoring.labels" . | nindent 4 }}
    {{- include "glerp-monitoring.prometheusRuleLabels" . | nindent 4 }}
spec:
  namespaceSelector:
    any: true
  selector:
    matchExpressions:
      - key: v1.min.io/tenant
        operator: Exists
  podMetricsEndpoints:
    - port: minio-port
      path: /minio/v2/metrics/cluster
      interval: "60s"
      scrapeTimeout: "30s"
      relabelings:
        # Carry the tenant name and namespace into metrics as useful labels.
        - sourceLabels: [__meta_kubernetes_pod_label_v1_min_io_tenant]
          targetLabel: tenant
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: job
          replacement: "minio-$1"
