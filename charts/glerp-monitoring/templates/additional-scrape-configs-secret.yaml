{{- /*
Prometheus additionalScrapeConfigs Secret.
Enables label-based auto-discovery of GLerp sites.

To add a new GLerp site to monitoring, add to its Kubernetes Service:
  labels:
    glerp-monitoring: "enabled"
  annotations:
    glerp-monitoring/public-url: "https://<company>.{{ .Values.cluster.domain }}"

After labeling, Prometheus discovers the site within ~60 seconds.
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-scrape-configs
  namespace: {{ .Values.monitoringNamespace }}
  labels:
    {{- include "glerp-monitoring.labels" . | nindent 4 }}
type: Opaque
stringData:
  scrape-configs.yaml: |
    # ── Tier 1: Basic HTTPS reachability ──────────────────────────────────────
    - job_name: 'glerp-sites-basic'
      scrape_interval: 60s
      scrape_timeout: 15s
      metrics_path: /probe
      params:
        module: [http_2xx]
      kubernetes_sd_configs:
        - role: service
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_label_glerp_monitoring]
          action: keep
          regex: enabled
        # Drop services that have the label but are missing the public-url annotation.
        # Without this, annotation-less services probe a garbage URL and always fail.
        - source_labels: [__meta_kubernetes_service_annotation_glerp_monitoring_public_url]
          action: drop
          regex: ^$
        - source_labels: [__meta_kubernetes_service_annotation_glerp_monitoring_public_url]
          action: replace
          regex: (.+)
          replacement: '${1}/login'
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: '{{ include "glerp-monitoring.blackboxAddress" . }}'
        - source_labels: [__meta_kubernetes_namespace]
          target_label: site
        - target_label: probe_tier
          replacement: basic

    # ── Tier 2: Login page content validation (canonical SLA signal) ───────────
    - job_name: 'glerp-sites-login'
      scrape_interval: 60s
      scrape_timeout: 15s
      metrics_path: /probe
      params:
        module: [http_glerp_login]
      kubernetes_sd_configs:
        - role: service
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_label_glerp_monitoring]
          action: keep
          regex: enabled
        - source_labels: [__meta_kubernetes_service_annotation_glerp_monitoring_public_url]
          action: drop
          regex: ^$
        - source_labels: [__meta_kubernetes_service_annotation_glerp_monitoring_public_url]
          action: replace
          regex: (.+)
          replacement: '${1}/login'
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: '{{ include "glerp-monitoring.blackboxAddress" . }}'
        - source_labels: [__meta_kubernetes_namespace]
          target_label: site
        - target_label: probe_tier
          replacement: login

    # ── ISP / Internet connectivity (static external targets) ─────────────────
    # Three independent external endpoints. A majority failure (>= 2 of 3) triggers
    # ISPConnectivityLost and suppresses per-site alerts during ISP outages.
    - job_name: 'internet-connectivity'
      scrape_interval: 60s
      scrape_timeout: 15s
      metrics_path: /probe
      params:
        module: [http_internet]
      static_configs:
        - targets:
          {{- range .Values.internetProbes.targets }}
          - {{ . }}
          {{- end }}
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: '{{ include "glerp-monitoring.blackboxAddress" . }}'

    # ── Internal Frappe worker health (diagnostic only) ────────────────────────
    - job_name: 'glerp-sites-internal'
      scrape_interval: 120s
      scrape_timeout: 10s
      metrics_path: /probe
      params:
        module: [http_2xx_internal]
      kubernetes_sd_configs:
        - role: service
      relabel_configs:
        - source_labels: [__meta_kubernetes_service_label_glerp_monitoring]
          action: keep
          regex: enabled
        - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_namespace]
          action: replace
          regex: (.+);(.+)
          replacement: 'http://${1}.${2}.svc.cluster.local/api/method/ping'
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: '{{ include "glerp-monitoring.blackboxAddress" . }}'
        - source_labels: [__meta_kubernetes_namespace]
          target_label: site
        - target_label: probe_tier
          replacement: internal
