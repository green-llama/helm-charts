{{- if .Values.victoriaMetrics.enabled }}
{{- /*
Grafana datasource ConfigMap for VictoriaMetrics.
Rancher Grafana's datasource sidecar watches for ConfigMaps with the label
grafana_datasource="1" and auto-provisions them within ~60 seconds.

This adds "VictoriaMetrics (GLerp Long-term)" as a datasource. The SLA
Compliance dashboard defaults to this datasource so 30-day queries use
data with full retention rather than Prometheus's short retention window.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-victoriametrics-datasource
  namespace: {{ .Values.monitoringNamespace }}
  labels:
    {{- include "glerp-monitoring.labels" . | nindent 4 }}
    grafana_datasource: "1"
data:
  victoriametrics-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics (GLerp Long-term)
        uid: glerp-victoriametrics
        type: prometheus
        # VictoriaMetrics exposes a Prometheus-compatible query API on port 8428
        url: http://{{ .Release.Name }}-victoriametrics.{{ .Values.monitoringNamespace }}.svc.cluster.local:8428
        access: proxy
        isDefault: false
        editable: false
        jsonData:
          timeInterval: "60s"
          queryTimeout: "60s"
          httpMethod: POST
{{- end }}
