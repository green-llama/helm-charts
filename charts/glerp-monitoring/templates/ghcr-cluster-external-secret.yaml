{{- if and .Values.ghcrRegistryAuth.enabled .Values.ghcrRegistryAuth.eso.enabled .Values.ghcrRegistryAuth.eso.createResources .Values.ghcrRegistryAuth.eso.clusterExternalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: {{ .Values.ghcrRegistryAuth.secretName }}
  labels:
    {{- include "glerp-monitoring.labels" . | nindent 4 }}
spec:
  namespaceSelector:
    {{- toYaml .Values.ghcrRegistryAuth.eso.clusterExternalSecret.namespaceSelector | nindent 4 }}
  refreshTime: 1h
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: {{ required "ghcrRegistryAuth.eso.clusterSecretStoreName is required when clusterExternalSecret.enabled=true" .Values.ghcrRegistryAuth.eso.clusterSecretStoreName }}
      kind: ClusterSecretStore
    target:
      name: {{ .Values.ghcrRegistryAuth.secretName }}
      creationPolicy: Owner
      template:
        type: kubernetes.io/dockerconfigjson
    data:
      - secretKey: .dockerconfigjson
        remoteRef:
          key: {{ .Values.ghcrRegistryAuth.secretName }}
          property: .dockerconfigjson
{{- end }}
