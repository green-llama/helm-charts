{{- if and .Values.ghcrRegistryAuth.enabled .Values.ghcrRegistryAuth.eso.enabled .Values.ghcrRegistryAuth.eso.createResources }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.ghcrRegistryAuth.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glerp-monitoring.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ required "ghcrRegistryAuth.eso.clusterSecretStoreName is required when eso.createResources=true" .Values.ghcrRegistryAuth.eso.clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.ghcrRegistryAuth.secretName }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: {{ .Values.ghcrRegistryAuth.secretName }}
        property: .dockerconfigjson
{{- end }}
