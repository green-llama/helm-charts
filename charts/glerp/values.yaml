# ── GLerp site identity ───────────────────────────────────────────────────────
# The Frappe site this release deploys/manages, used by the create-site/migrate jobs
# and (in tenant mode) for host names, TLS, ingress and the monitoring probe URL.
#
# siteName: leave EMPTY to use the Green Llama convention <namespace>.<domain>
#   (e.g. namespace glerp-ci + domain dev.greenllama.tech -> glerp-ci.dev.greenllama.tech).
#   Set it to override with an explicit site name. (jobs.createSite.siteName wins over this.)
# domain: the base domain; combined with the namespace to derive the site FQDN + probe URL.
siteName: ""
domain: greenllama.tech

# ── Tenant infrastructure ─────────────────────────────────────────────────────
# Default ON. The chart manages the per-tenant objects (IngressRoute, cert-manager
# Certificate, ESO/Vault secrets, MinIO Tenant, Velero backups, DFP external-storage) — dev
# and production share the same architecture. All use the RELEASE NAMESPACE as the tenant name
# and .Values.tenant.domain (falls back to .Values.domain). Only set tenant.enabled=false for a
# bare cluster that lacks Vault/cert-manager/MinIO.
#
# PREREQUISITE (still external, per plan): the Vault policy + k8s-auth role for
# "<namespace>-app-role" must exist (created in CI or by the documented one-time script).
tenant:
  enabled: true
  domain: ""                      # e.g. dev.greenllama.tech (defaults to .Values.domain)
  externalDnsTarget: ""           # e.g. pec.greenllama.tech (for external-dns annotations)
  tlsSecretName: letsencrypt-greenllama-tech-tls
  serviceAccount:
    enabled: true                 # <ns>-sa + secret-reader Role/RoleBinding
  ingressRoute:
    enabled: true                 # Traefik IngressRoute -> glerp:8080 at <ns>.<domain>
    traefikNamespace: traefik-system
    entryPoints:                  # list of Traefik entrypoints
      - websecure
    # TLS for the route. secretName empty -> falls back to tenant.tlsSecretName
    # (default letsencrypt-greenllama-tech-tls). Set tls.enabled=false for no TLS.
    tls:
      enabled: true
      secretName: ""             # per-route override; else tenant.tlsSecretName
      options: {}                # merged verbatim into spec.tls (e.g. certResolver, domains)
    middlewares: []              # e.g. [{ name: my-mw, namespace: traefik-system }]
    pathPrefix: /                # match PathPrefix
    matchExtra: ""              # extra Traefik match appended with && (e.g. Headers(...))
    annotations: {}             # extra annotations merged onto the IngressRoute
  certificate:
    enabled: true                 # cert-manager leaf cert for the namespace
    clusterIssuer: apps-general-signer
    duration: 2160h
    renewBefore: 360h
  externalSecrets:
    enabled: true                 # ESO ExternalSecrets read from Vault
    vaultStore: vault-backend           # ClusterSecretStore for tenant kv secrets
    caStore: kubernetes-token-auth      # ClusterSecretStore for the CA trust bundle
    ghcrVaultKey: secret/data/github/ghcr-cred
  vault:
    # KV v2 mount for per-tenant secrets. ExternalSecrets read <mountPath>/data/<ns>/...
    # (raw KV v2 API path); PushSecrets write <mountPath>/<ns>/... (ESO adds data/). Both
    # resolve to the same secret. Matches the working glerpSiteInstallTemplate convention.
    mountPath: secret
    pushSecrets:
      enabled: true               # ESO Password Generator + PushSecret create the random
                                  # mariadb-root/minio creds and push them INTO Vault
      # WRITE store — must auth as a Vault identity with create/read/update on
      # secret/{data,metadata}/*. The default read store (vault-backend / eso-universal-reader)
      # is READ-ONLY and cannot push. Use a dedicated write store (see TENANT.md setup).
      store: vault-pushwriter
  minio:
    enabled: true                 # per-tenant MinIO Tenant + its IngressRoute
    # USER (usable) file space is ~half of raw after erasure-coding parity.
    # Default target: ~12Gi usable => ~24Gi raw = pools*servers*volumesPerServer*volumeSize.
    #   2 * 2 * 2 * 3Gi = 24Gi raw  ≈  12Gi usable.
    pools: 2
    servers: 2
    volumesPerServer: 2
    volumeSize: 3Gi
    storageClass: directpv-min-io
    vaultKmsRole: ""              # defaults to "<ns>-role"
    vaultKmsKeyName: minio-key
    vaultAddr: http://vault-active.vault-system.svc.cluster.local:8200
  velero:
    enabled: true                 # daily namespace backup
    namespace: velero
    schedule: "0 2 * * *"
    storageLocation: idrive-e2
    ttl: 720h0m0s
  monitoringProbe:
    enabled: true                 # Service labeled for glerp-monitoring uptime probing
    # Public URL the uptime probe hits. Precedence: publicUrl (full override) >
    # https://<ns>.<domain>[:externalPort]. Dev cluster is reached on :10443 (NATed to :443),
    # so set externalPort: 10443 there; leave empty (standard 443) for production.
    publicUrl: ""
  externalPort: ""                # e.g. 10443 for the dev cluster; empty = standard https (443)
  dfp:
    # After site create+migrate, auto-configure a DFP External Storage doc pointing at the
    # per-tenant MinIO bucket so file attachments are stored in MinIO. Idempotent (upsert by
    # title minio-<ns>-attachments). Needs the dfp_external_storage app (in the image) + the
    # <ns>-minio-creds secret; skipped automatically if either is missing.
    enabled: true
  zapScanLabel:
    enabled: false                # glerp.io/private-registry — ONLY the one ZAP-scanned
                                  # site per cluster (backuptest in dev, greenllama in prod)

# ── Cache / queue backend ─────────────────────────────────────────────────────
# DEFAULT: Valkey (official open-source Redis fork). Frappe 16 uses RESP3 client-side
# cache invalidation (CLIENT TRACKING), which Valkey/Redis support fully and DragonflyDB
# does not — so Valkey gives correct, fast behaviour with NO patch dependency and avoids
# the paywalled bitnami Redis chart. Enable exactly ONE cache backend and ONE queue backend.
#   - Valkey (default): valkey-cache/valkey-queue enabled
#   - DragonflyDB: set valkey-* off + dragonfly-* on (needs the redis_wrapper patch; slower
#     migrations because client tracking is disabled — see patches/README.md)
#   - external: set externalRedis.cache/queue and disable all in-chart backends
valkey-cache:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "7.2"
valkey-queue:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "7.2"
dragonfly-cache:
  enabled: false
dragonfly-queue:
  enabled: false
  storage:
    enabled: false
    size: 8Gi
externalRedis:
  cache: ''
  queue: ''
# One-off passthrough objects. Rendered through `tpl` (extra-objects.yaml), so entries may
# use real Helm expressions like {{ .Release.Namespace }} / {{ .Values.tenant.domain }}.
# The standard tenant objects are now native templates under templates/tenant/ (tenant.enabled).
extraObjects: []

fullnameOverride: ''
httproute:
  annotations: {}
  enabled: false
  hostnames:
    - erp.example.com
  name: ''
  parentRefs:
    - gatewayName: public-gateway
      gatewayNamespace: networking
      gatewaySectionName: http
  rules:
    - matches:
        - path: /
          pathType: PathPrefix
image:
  pullPolicy: Always
  repository: ghcr.io/green-llama/glerp-image
  # tag is managed automatically by glerp-image/.github/workflows/build.yml. Do not hand-edit.
  tag: 1.0.38
imagePullSecrets:
  - name: ghcr-cred
ingress:
  annotations: {}
  enabled: false    #RJB: Set to false, we use ingressRoutes
  hosts:
    - host: erp.cluster.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
jobs:
  backup:
    affinity: {}
    backoffLimit: 0
    enabled: false
    nodeSelector: {}
    resources: {}
    siteName: ""                    # empty -> derived <namespace>.<domain> (see glerp.siteName)
    tolerations: []
    withFiles: true
  configure:
    affinity: {}
    args: []
    backoffLimit: 0
    command: []
    enabled: true
    envVars: []
    fixVolume: true
    nodeSelector: {}
    resources: {}
    tolerations: []
  createSite:
    adminExistingSecret: ''
    adminExistingSecretKey: password
    adminPassword: changeit
    affinity: {}
    backoffLimit: 0
    dbType: mariadb
    enabled: true
    forceCreate: false
    # If the site DIRECTORY exists but the site does not respond to `bench list-apps`, the
    # job ABORTS by default (data-safe — it never deletes based on a command failure, which
    # could be a transient DB/config issue on a real site). Set this true ONLY to deliberately
    # delete + recreate a site you are certain is incomplete/empty (e.g. an interrupted first
    # install). DESTRUCTIVE — never enable it on a site that may hold data.
    recreateIncompleteSite: false
    migrateAfterAppSync: true
    # installApps: leave EMPTY to install ALL apps baked into the image (read from the
    # bench's sites/apps.txt at runtime) — the site always matches the image, nothing to
    # maintain here. Set an explicit list only to install a curated subset on a site.
    installApps: []
    nodeSelector: {}
    resources: {}
    # Site name for this deployment. Set per install, e.g.
    #   --set jobs.createSite.siteName=acme.dev.greenllama.tech
    # If left empty, it falls back to the chart-level .Values.siteName (see top of values).
    siteName: ""
    tolerations: []
    upgradeAppsOnExistingSite: true
  custom:
    affinity: {}
    backoffLimit: 0
    containers: []
    enabled: false
    initContainers: []
    jobName: ''
    labels: {}
    nodeSelector: {}
    restartPolicy: Never
    tolerations: []
    volumes: []
  dropSite:
    affinity: {}
    backoffLimit: 0
    enabled: false
    forced: false
    nodeSelector: {}
    resources: {}
    siteName: ""                    # empty -> derived <namespace>.<domain> (see glerp.siteName)
    tolerations: []
  migrate:
    affinity: {}
    backoffLimit: 0
    enabled: false
    nodeSelector: {}
    resources: {}
    # Empty -> falls back to chart-level .Values.siteName. Set migrate.enabled=true on a
    # `helm upgrade` to run `bench migrate` (maintenance-mode on/off) for the site.
    siteName: ""
    skipFailing: false
    tolerations: []
  volumePermissions:
    affinity: {}
    backoffLimit: 0
    enabled: false
    nodeSelector: {}
    resources: {}
    tolerations: []
mariadb:
  enabled: false
mariadb-sts:
  enabled: true
  image:
    pullPolicy: IfNotPresent
    repository: mariadb
    tag: '10.6'
  myCnf: |
    [mysqld]
    # Character Set - Required for GLerp compatibility
    skip-character-set-client-handshake
    skip-innodb-read-only-compressed
    character-set-server=utf8mb4
    collation-server=utf8mb4_unicode_ci

    # Memory Architecture: Focused on RAM-Residency
    # 2GB allows 160k+ items & 1 year of GL entries to live in memory
    innodb_buffer_pool_size = 2G
    innodb_buffer_pool_instances = 2

    # Transaction Log: High-volume write optimization
    innodb_log_file_size = 512M
    innodb_flush_log_at_trx_commit = 2

    # Connection Management: Prevents "Connection Exhaustion" errors
    max_connections = 100
    tmp_table_size = 64M
    max_heap_table_size = 64M
  persistence:
    size: 10Gi                        # database volume (Longhorn encrypted)
    storageClass: longhorn-crypto-mariadb-rwo
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  # rootPassword / generateRootSecret: chart-managed root secret (dev/test path).
  # existingSecret: point at an externally-managed secret (e.g. the Vault-synced
  # "<namespace>-mariadb-root"). When tenant.enabled=true and name is empty, the helper
  # defaults to "<namespace>-mariadb-root" automatically (matches the tenant ExternalSecret).
  generateRootSecret: false
  existingSecret:
    name: ""
    key: "mariadb-root-password"
nameOverride: ''
nginx:
  affinity: {}
  autoscaling:
    enabled: false
    maxReplicas: 3
    minReplicas: 1
    targetCPU: 75
    targetMemory: 75
  defaultTopologySpread:
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
  envVars: []
  environment:    #RJB: Must use uppercase variables here as follows.  Set upload size to 500 Meg limit
    # Increase this from 120 to 600 (10 minutes) to survive the setup wizard
    PROXY_READ_TIMEOUT: '600'  #RJB: update Feb12
    # Also increase these to prevent the client from dropping during slow POST requests
    PROXY_CONNECT_TIMEOUT: '600' #RJB: update Feb12
    PROXY_SEND_TIMEOUT: '600'  #RJB: update Feb12
    CLIENT_MAX_BODY_SIZE: 500m
    FRAPPE_SITE_NAME_HEADER: $host
    UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
    UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
    UPSTREAM_REAL_IP_RECURSIVE: 'off'
  initContainers: []
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    tcpSocket:
      port: 8080
  nodeSelector: {}
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    tcpSocket:
      port: 8080
  replicaCount: 1
  resources: {}
  service:
    port: 8080
    type: ClusterIP
  sidecars: []
  tolerations: []
persistence:
  logs:
    accessModes:
      - ReadWriteMany
    enabled: false
    size: 8Gi
  worker:
    accessModes:
      - ReadWriteMany
    enabled: true
    # Shared config/sites volume mounted to all pods (bench config, not user files —
    # user files go to MinIO). 2Gi is plenty. Longhorn encrypted RWX.
    size: 2Gi
    storageClass: longhorn-crypto-rwm
podSecurityContext:
  supplementalGroups:
    - 1000
postgresql:
  enabled: false
postgresql-sts:
  enabled: false
  image:
    pullPolicy: IfNotPresent
    repository: postgres
    tag: '15'
  persistence:
    size: 8Gi
  postgresPassword: changeit
  postgresUser: postgres
  resources: {}
securityContext:
  capabilities:
    add:
      - CAP_CHOWN
serviceAccount:
  create: true
rbac:
  secretReader:
    enabled: true
    name: secret-reader
    bindingName: secret-reader-binding
socketio:
  affinity: {}
  autoscaling:
    enabled: false
    maxReplicas: 3
    minReplicas: 1
    targetCPU: 75
    targetMemory: 75
  envVars: []
  initContainers: []
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    tcpSocket:
      port: 9000
  nodeSelector: {}
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    tcpSocket:
      port: 9000
  replicaCount: 1
  resources: {}
  service:
    port: 9000
    type: ClusterIP
  sidecars: []
  tolerations: []
worker:
  default:
    affinity: {}
    autoscaling:
      enabled: false
      maxReplicas: 3
      minReplicas: 1
      targetCPU: 75
      targetMemory: 75
    envVars: []
    initContainers: []
    livenessProbe:
      override: false
      probe: {}
    nodeSelector: {}
    readinessProbe:
      override: false
      probe: {}
    replicaCount: 1
    resources: {}
    sidecars: []
    tolerations: []
  defaultTopologySpread:
    maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
  gunicorn:
    affinity: {}
    args: []
    autoscaling:
      enabled: false
      maxReplicas: 3
      minReplicas: 1
      targetCPU: 75
      targetMemory: 75
    envVars: []
    initContainers: []
    livenessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      tcpSocket:
        port: 8000
    nodeSelector: {}
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      tcpSocket:
        port: 8000
    replicaCount: 1
    resources: {}
    service:
      port: 8000
      type: ClusterIP
    sidecars: []
    tolerations: []
  healthProbe: |
    exec:
      command:
        - bash
        - -c
        - |-
          echo "Pinging backing services";
          {{- if (index .Values "mariadb-sts").enabled }}
          wait-for-it {{ include "erpnext.fullname" . }}-mariadb-sts:3306 -t 1;
          {{- else if (index .Values "postgresql-sts").enabled }}
          wait-for-it {{ include "erpnext.fullname" . }}-postgresql-sts:5432 -t 1;
          {{- else if .Values.dbHost }}
          wait-for-it {{ .Values.dbHost }}:{{ .Values.dbPort }} -t 1;
          {{- end }}
          {{- if .Values.externalRedis.cache }}
          wait-for-it $(echo {{ .Values.externalRedis.cache }} | sed 's,redis://,,') -t 1;
          {{- else if (index .Values "valkey-cache").enabled }}
          wait-for-it {{ .Release.Name }}-valkey-cache:6379 -t 1;
          {{- else if (index .Values "dragonfly-cache").enabled }}
          wait-for-it {{ .Release.Name }}-dragonfly-cache:6379 -t 1;
          {{- end }}
          {{- if .Values.externalRedis.queue }}
          wait-for-it $(echo {{ .Values.externalRedis.queue }} | sed 's,redis://,,') -t 1;
          {{- else if (index .Values "valkey-queue").enabled }}
          wait-for-it {{ .Release.Name }}-valkey-queue:6379 -t 1;
          {{- else if (index .Values "dragonfly-queue").enabled }}
          wait-for-it {{ .Release.Name }}-dragonfly-queue:6379 -t 1;
          {{- end }}
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 5
  long:
    affinity: {}
    autoscaling:
      enabled: false
      maxReplicas: 3
      minReplicas: 1
      targetCPU: 75
      targetMemory: 75
    envVars: []
    initContainers: []
    livenessProbe:
      override: false
      probe: {}
    nodeSelector: {}
    readinessProbe:
      override: false
      probe: {}
    replicaCount: 1
    resources: {}
    sidecars: []
    tolerations: []
  scheduler:
    affinity: {}
    envVars: []
    initContainers: []
    livenessProbe:
      override: false
      probe: {}
    nodeSelector: {}
    readinessProbe:
      override: false
      probe: {}
    replicaCount: 1
    resources: {}
    sidecars: []
    tolerations: []
  short:
    affinity: {}
    autoscaling:
      enabled: false
      maxReplicas: 3
      minReplicas: 1
      targetCPU: 75
      targetMemory: 75
    envVars: []
    initContainers: []
    livenessProbe:
      override: false
      probe: {}
    nodeSelector: {}
    readinessProbe:
      override: false
      probe: {}
    replicaCount: 1
    resources: {}
    sidecars: []
    tolerations: []
