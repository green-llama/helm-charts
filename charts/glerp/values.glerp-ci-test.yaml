# Test values for deploying GLerp into the isolated `glerp-ci` namespace on the dev cluster.
# Goal: validate the site-lifecycle automation (create-site -> install ALL image apps ->
# migrate) on the SAME database backend production uses (hand-rolled mariadb-sts), with
# Valkey — self-contained, no Vault / ESO / cert-manager / MinIO required.
#
# Deploy:
#   helm upgrade --install glerp green-llama/glerp \
#     -n glerp-ci -f values.glerp-ci-test.yaml --set image.tag=<tag>

# --- Site identity -----------------------------------------------------------------
siteName: glerp-ci.dev.greenllama.tech
domain: dev.greenllama.tech

# --- Tenant infrastructure: MinIO ON for testing, Vault/cert-manager-dependent bits OFF ---
# glerp-ci has the MinIO operator + DirectPV but no Vault / cert-manager / Velero, so we
# enable ONLY the MinIO tenant (+ its IngressRoute) and the monitoring probe, and feed MinIO
# a plain test creds secret via extraObjects (instead of the Vault ExternalSecret).
tenant:
  enabled: true
  domain: dev.greenllama.tech
  externalDnsTarget: pec.greenllama.tech   # create the Cloudflare DNS record via external-dns
  minio:
    enabled: true
    # small test footprint: 1 pool x 1 server x 2 volumes x 1Gi = 2Gi raw ~= 1Gi usable
    pools: 1
    servers: 1
    volumesPerServer: 2
    volumeSize: 1Gi
  monitoringProbe:
    enabled: true
  # App IngressRoute ON so the site is reachable at https://glerp-ci.dev.greenllama.tech
  # with the cluster-wide letsencrypt-greenllama-tech-tls wildcard cert (in traefik-system).
  ingressRoute:
    enabled: true
  # cert-manager Certificate still OFF (glerp-ci uses the shared wildcard, not a per-ns leaf).
  certificate:
    enabled: false
  externalSecrets:
    enabled: false
  vault:
    pushSecrets:
      enabled: false
  velero:
    enabled: false

# Test-only MinIO creds secret (prod gets this from Vault via the tenant ExternalSecret).
extraObjects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: glerp-ci-minio-creds
    type: Opaque
    stringData:
      accesskey: "miniotest"
      secretkey: "miniotestsecret123"
      config.env: |
        export MINIO_ROOT_USER="miniotest"
        export MINIO_ROOT_PASSWORD="miniotestsecret123"

# --- Cache/queue: Valkey (default; full RESP3 client tracking, no patch needed) ------
valkey-cache:
  enabled: true
valkey-queue:
  enabled: true
dragonfly-cache:
  enabled: false
dragonfly-queue:
  enabled: false

# --- Database: the SAME hand-rolled mariadb-sts as production (official mariadb image),
#     but with a CHART-GENERATED root secret instead of the Vault ExternalSecret. -------
mariadb:
  enabled: false
mariadb-sts:
  enabled: true
  # generateRootSecret: chart creates the <fullname> root Secret (via templates/secret.yaml)
  # instead of pulling it from Vault. existingSecret is cleared so the helper resolves to it.
  generateRootSecret: true
  existingSecret:
    name: ""
    key: ""
  persistence:
    size: 2Gi                          # small encrypted DB volume for the test
    storageClass: longhorn-crypto-mariadb-rwo
dbRootPassword: "changeit-ci"          # test-only; seeds the generated root secret
postgresql:
  enabled: false
postgresql-sts:
  enabled: false

# --- Site lifecycle: create the site + install ALL image apps + migrate --------------
jobs:
  createSite:
    enabled: true
    dbType: mariadb
    adminPassword: "admin-ci"            # test-only
    installApps: []                       # [] => install every app baked into the image
    migrateAfterAppSync: true
    upgradeAppsOnExistingSite: true
  configure:
    enabled: true

ingress:
  enabled: false

# --- Pull secret (create `ghcr-cred` in glerp-ci) -----------------------------------
imagePullSecrets:
  - name: ghcr-cred
