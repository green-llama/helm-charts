{{- $m := (index .Values "mariadb-sts") | default dict -}}
{{- $mExisting := (get $m "existingSecret") | default dict -}}
{{- $mExistingName := (get $mExisting "name") | default "" -}}
{{- /* Generate the mariadb root secret in-chart when mariadb-sts wants it and no external
       (Vault) existingSecret is configured — i.e. the test/dev path. Written under the same
       key the mariadb-sts consumers read (glerp.mariadbRootSecretKey, default
       "mariadb-root-password"). Production leaves generateRootSecret unset and points
       existingSecret.name at the Vault-synced secret instead. */ -}}
{{- $genMaria := and (get $m "enabled") (not $mExistingName) (or (get $m "generateRootSecret") (get $m "rootPassword") .Values.dbRootPassword) -}}
{{- $mariaPw := (get $m "rootPassword") | default .Values.dbRootPassword -}}
{{- if or $genMaria (and .Values.dbRootPassword (not .Values.dbExistingSecret)) (and (index .Values "postgresql-sts").enabled (index .Values "postgresql-sts").postgresPassword) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "erpnext.fullname" . }}
type: Opaque
stringData:
  {{- if and (index .Values "postgresql-sts").enabled (index .Values "postgresql-sts").postgresPassword }}
  postgres-password: {{ (index .Values "postgresql-sts").postgresPassword | quote }}
  {{- end }}
  {{- if $genMaria }}
  {{ include "glerp.mariadbRootSecretKey" . }}: {{ required "mariadb-sts.generateRootSecret needs dbRootPassword or mariadb-sts.rootPassword" $mariaPw | quote }}
  {{- end }}
  {{- if and .Values.dbRootPassword (not .Values.dbExistingSecret) }}
  db-root-password: {{ .Values.dbRootPassword | quote }}
  {{- end }}
{{- end }}
