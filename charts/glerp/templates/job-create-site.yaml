{{- if .Values.jobs.createSite.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  {{- if .Values.jobs.createSite.jobName }}
  name: {{ .Values.jobs.createSite.jobName }}
  {{- else }}
  name: {{ template "erpnext.fullname" . }}-new-site-{{ now | date "20060102150405" }}
  {{- end }}
  labels:
    {{- include "erpnext.labels" . | nindent 4 }}
  annotations:
{{- with .Values.jobs.createSite.annotations }}
{{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
{{- end }}
{{- end }}
spec:
  backoffLimit: {{ .Values.jobs.createSite.backoffLimit }}
  template:
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ template "erpnext.serviceAccountName" $ }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: validate-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "-c"]
          args:
            - |
              set -e
              mkdir -p sites
              [[ -f sites/common_site_config.json ]] || echo "{}" > sites/common_site_config.json
              # The sites/ PVC shadows the image's built-in sites/apps.txt; seed it so bench
              # can enumerate the apps baked into the image. Prefer the unmounted stash
              # (image-apps.txt); fall back to deriving the list from apps/ (frappe first).
              if [[ ! -f sites/apps.txt ]]; then
                if [[ -f /home/frappe/frappe-bench/image-apps.txt ]]; then
                  cp /home/frappe/frappe-bench/image-apps.txt sites/apps.txt
                else
                  { echo frappe; ls apps | grep -vx frappe; } > sites/apps.txt
                fi
              fi
              python - <<'PY'
              import json, os, pathlib
              p = pathlib.Path("sites/common_site_config.json")
              cfg = json.loads(p.read_text() or "{}")
              cfg.setdefault("db_host", os.environ["DB_HOST"])
              cfg.setdefault("db_port", int(os.environ["DB_PORT"]))
              cfg.setdefault("redis_cache", os.environ["REDIS_CACHE"])
              cfg.setdefault("redis_queue", os.environ["REDIS_QUEUE"])
              cfg.setdefault("redis_socketio", os.environ["REDIS_QUEUE"])
              p.write_text(json.dumps(cfg, indent=2))
              print("common_site_config.json ensured with db/redis settings")
              PY
              echo "Waiting for database to be reachable..."
              wait-for-it -t 180 ${DB_HOST}:${DB_PORT}
              echo "Database is reachable."
          env:
            - name: "DB_HOST"
              {{- if (get .Values "mariadb-sts").enabled }}
              value: {{ include "erpnext.fullname" . }}-mariadb-sts
              {{- else if (get .Values "postgresql-sts").enabled }}
              value: {{ include "erpnext.fullname" . }}-postgresql-sts
              {{- else }}
              value: "{{ .Values.dbHost }}"
              {{- end }}
            - name: "DB_PORT"
              {{- if (get .Values "mariadb-sts").enabled }}
              value: "3306"
              {{- else if (get .Values "postgresql-sts").enabled }}
              value: "5432"
              {{- else if .Values.dbPort }}
              value: {{ .Values.dbPort | quote }}
              {{- else if eq .Values.jobs.createSite.dbType "mariadb" }}
              value: "3306"
              {{- else if eq .Values.jobs.createSite.dbType "postgres" }}
              value: "5432"
              {{- end }}
            - name: "REDIS_CACHE"
              {{- if .Values.externalRedis.cache }}
              value: {{ .Values.externalRedis.cache | quote }}
              {{- else if (get .Values "valkey-cache").enabled }}
              value: redis://{{ .Release.Name }}-valkey-cache:6379
              {{- else if (get .Values "dragonfly-cache").enabled }}
              value: redis://{{ .Release.Name }}-dragonfly-cache:6379
              {{- else }}
              value: ""
              {{- end }}
            - name: "REDIS_QUEUE"
              {{- if .Values.externalRedis.queue }}
              value: {{ .Values.externalRedis.queue | quote }}
              {{- else if (get .Values "valkey-queue").enabled }}
              value: redis://{{ .Release.Name }}-valkey-queue:6379
              {{- else if (get .Values "dragonfly-queue").enabled }}
              value: redis://{{ .Release.Name }}-dragonfly-queue:6379
              {{- else }}
              value: ""
              {{- end }}
          resources:
            {{- toYaml .Values.jobs.createSite.resources | nindent 12 }}
          securityContext:
            {{- toYaml $.Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: sites-dir
              mountPath: /home/frappe/frappe-bench/sites
      containers:
      - name: create-site
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["bash", "-c"]
        args:
          - |-
            set -x;
            {{- if .Values.jobs.createSite.upgradeAppsOnExistingSite }}
            set -euo pipefail;

            # UPGRADE-SAFE / IDEMPOTENT: if the site already exists we NEVER recreate it —
            # we only sync new apps + migrate below, preserving all existing customer data.
            # `forceCreate` (--force, which DROPS the database) is honored ONLY when the site
            # is absent; on an existing site it is explicitly refused, so a stray
            # forceCreate=true on an upgrade can't destroy data.
            if bench --site "${SITE_NAME}" list-apps > /tmp/installed_apps.txt 2>/dev/null; then
                echo "Site ${SITE_NAME} already exists — upgrade mode: skipping new-site (data retained)";
                {{- if .Values.jobs.createSite.forceCreate }}
                echo "NOTE: jobs.createSite.forceCreate=true is IGNORED because the site exists (refusing to drop existing data).";
                {{- end }}
            else
                echo "Site ${SITE_NAME} not found, creating site";
                bench new-site ${SITE_NAME} \
                  --no-mariadb-socket \
                  --db-type=${DB_TYPE} \
                  --db-host=${DB_HOST} \
                  --db-port=${DB_PORT} \
                  --admin-password=${ADMIN_PASSWORD} \
                  --mariadb-root-username=${DB_ROOT_USER} \
                  --mariadb-root-password=${DB_ROOT_PASSWORD} \
                {{- if .Values.jobs.createSite.forceCreate }}
                  --force \
                {{- end }}
                ;
                bench --site "${SITE_NAME}" list-apps > /tmp/installed_apps.txt
            fi

            {{- if .Values.jobs.createSite.installApps }}
            # Explicit curated list from values.
            apps=(
              {{- range .Values.jobs.createSite.installApps }}
              "{{ . }}"
              {{- end }}
            )
            {{- else }}
            # Default: install ALL apps baked into the IMAGE. Source of truth is the image's
            # own app list (image-apps.txt stash, or the apps/ dir) — NOT the site's
            # sites/apps.txt, which on an upgrade is stale (won't contain apps added in a newer
            # image, e.g. dfp_external_storage). This keeps the site in lockstep with the image
            # on every upgrade. frappe is the framework and is always present.
            if [ -f /home/frappe/frappe-bench/image-apps.txt ]; then
              mapfile -t apps < <(grep -v '^frappe$' /home/frappe/frappe-bench/image-apps.txt)
            else
              mapfile -t apps < <(ls apps | grep -vx frappe)
            fi
            # keep the site's apps.txt in sync with the image list (runtime pods read it)
            { echo frappe; printf '%s\n' "${apps[@]}"; } > sites/apps.txt
            {{- end }}
            for app in "${apps[@]}"; do
                [ -z "${app}" ] && continue
                if grep -Fxq "${app}" /tmp/installed_apps.txt; then
                    echo "App already installed: ${app}";
                else
                    echo "Installing app: ${app}";
                    bench --site "${SITE_NAME}" install-app "${app}";
                    echo "${app}" >> /tmp/installed_apps.txt;
                fi
            done

            {{- if .Values.jobs.createSite.migrateAfterAppSync }}
            echo "Running migrate after app sync";
            bench --site "${SITE_NAME}" migrate;
            {{- end }}

            {{- if and .Values.tenant.enabled .Values.tenant.dfp.enabled }}
            # ── Auto-configure DFP External Storage -> per-tenant MinIO bucket ──────────
            # Idempotent upsert (keyed by title). Only runs if dfp_external_storage is
            # installed and MinIO creds are present. Attachments/files land in MinIO.
            if grep -Fxq "dfp_external_storage" /tmp/installed_apps.txt && [ -n "${MINIO_ACCESS_KEY:-}" ]; then
              echo "Configuring DFP External Storage -> MinIO";
              export DFP_TITLE={{ printf "minio-%s-attachments" .Release.Namespace | quote }}
              export DFP_ENDPOINT={{ printf "minio.%s.svc.cluster.local:80" .Release.Namespace | quote }}
              export DFP_BUCKET={{ .Release.Namespace | quote }}
              # Write the upsert script to /tmp at column 0 (strip the YAML indent), pipe into
              # `bench console` (runs arbitrary Python in the site context).
              cat > /tmp/dfp_configure.py <<'PYEOF'
            import os, frappe
            title = os.environ["DFP_TITLE"]
            existing = frappe.db.get_value("DFP External Storage", {"title": title}, "name")
            doc = frappe.get_doc("DFP External Storage", existing) if existing else frappe.new_doc("DFP External Storage")
            doc.title = title
            doc.enabled = 1
            doc.type = "S3 Compatible"
            doc.endpoint = os.environ["DFP_ENDPOINT"]
            doc.secure = 0
            doc.bucket_name = os.environ["DFP_BUCKET"]
            doc.region = "auto"
            doc.access_key = os.environ["MINIO_ACCESS_KEY"]
            doc.secret_key = os.environ["MINIO_SECRET_KEY"]
            doc.presigned_urls = 0
            doc.set("folders", [])
            for f in ("Home/Attachments", "Home"):
                doc.append("folders", {"folder": f})
            doc.set("doctypes_ignored", [])
            for dt in ("Data Import", "Prepared Report"):
                doc.append("doctypes_ignored", {"doctype_to_ignore": dt})
            doc.save()
            frappe.db.commit()
            print("DFP External Storage configured:", doc.name)
            PYEOF
              sed -i 's/^            //' /tmp/dfp_configure.py
              bench --site "${SITE_NAME}" console < /tmp/dfp_configure.py || echo "DFP config step failed (non-fatal)";
              rm -f /tmp/dfp_configure.py;
            else
              echo "DFP config skipped (dfp app not installed or MINIO creds not provided).";
            fi
            {{- end }}
            {{- else }}

            bench_output=$(bench new-site ${SITE_NAME} \
              --no-mariadb-socket \
              --db-type=${DB_TYPE} \
              --db-host=${DB_HOST} \
              --db-port=${DB_PORT} \
              --admin-password=${ADMIN_PASSWORD} \
              --mariadb-root-username=${DB_ROOT_USER} \
              --mariadb-root-password=${DB_ROOT_PASSWORD} \
            {{- if .Values.jobs.createSite.installApps }}
              {{- range .Values.jobs.createSite.installApps }}
              --install-app={{ . }} \
              {{- end }}
            {{- end }}
            {{- if .Values.jobs.createSite.forceCreate }}
              --force \
            {{- end }}
             | tee /dev/stderr);

            bench_exit_status=$?;

            if [ $bench_exit_status -ne 0 ]; then
                # Don't consider the case "site already exists" an error.
                if [[ $bench_output == *"already exists"* ]]; then
                    echo "Site already exists, continuing...";
                else
                    echo "An error occurred in bench new-site: $bench_output"
                    exit $bench_exit_status;
                fi
            fi

            set -e;
            {{- end }}

            rm -f currentsite.txt /tmp/installed_apps.txt
        env:
          - name: "SITE_NAME"
            value: {{ include "glerp.siteName" . | quote }}
          {{- if and .Values.tenant.enabled .Values.tenant.dfp.enabled }}
          # MinIO creds for DFP auto-config (optional: absent secret -> DFP step is skipped).
          - name: MINIO_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: {{ printf "%s-minio-creds" .Release.Namespace | quote }}
                key: accesskey
                optional: true
          - name: MINIO_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: {{ printf "%s-minio-creds" .Release.Namespace | quote }}
                key: secretkey
                optional: true
          {{- end }}
          - name: "DB_TYPE"
            value: {{ .Values.jobs.createSite.dbType }}
          - name: DB_HOST
            {{- if (get .Values "mariadb-sts").enabled }}
            value: {{ include "erpnext.fullname" . }}-mariadb-sts
            {{- else if (get .Values "postgresql-sts").enabled }}
            value: {{ include "erpnext.fullname" . }}-postgresql-sts
            {{- else }}
            value: "{{ .Values.dbHost }}"
            {{- end }}
          - name: "DB_PORT"
            {{- if (get .Values "mariadb-sts").enabled }}
            value: "3306"
            {{- else if (get .Values "postgresql-sts").enabled }}
            value: "5432"
            {{- else if .Values.dbPort }}
            value: {{ .Values.dbPort | quote }}
            {{- else if eq .Values.jobs.createSite.dbType "mariadb" }}
            value: "3306"
            {{- else if eq .Values.jobs.createSite.dbType "postgresql" }}
            value: "5432"
            {{- end }}
          - name: "DB_ROOT_USER"
            {{- if (get .Values "mariadb-sts").enabled }}
            value: "root"
            {{- else if (get .Values "postgresql-sts").enabled }}
            value: "postgres"
            {{- else }}
            value: "{{ .Values.dbRootUser }}"
            {{- end }}
          - name: "DB_ROOT_PASSWORD"
            {{- if (get .Values "mariadb-sts").enabled }}
            valueFrom:
              secretKeyRef:
                key: {{ include "glerp.mariadbRootSecretKey" . | quote }}
                name: {{ include "glerp.mariadbRootSecretName" . | quote }}
            {{- else if (index .Values "postgresql-sts").enabled }}
            valueFrom:
              secretKeyRef:
                key: postgresql-password
                name: {{ template "erpnext.fullname" . }}
            {{- else if .Values.dbExistingSecret }}
            valueFrom:
              secretKeyRef:
                key: {{ .Values.dbExistingSecretPasswordKey }}
                name: {{ .Values.dbExistingSecret }}
            {{- else if .Values.dbRootPassword }}
            valueFrom:
              secretKeyRef:
                key: db-root-password
                name: {{ template "erpnext.fullname" . }}
            {{- end }}
          - name: "ADMIN_PASSWORD"
            {{- if .Values.jobs.createSite.adminExistingSecret }}
            valueFrom:
              secretKeyRef:
                key: {{ .Values.jobs.createSite.adminExistingSecretKey }}
                name: {{ .Values.jobs.createSite.adminExistingSecret }}
            {{- else}}
            value: "{{ .Values.jobs.createSite.adminPassword }}"
            {{- end }}
        resources:
          {{- toYaml .Values.jobs.createSite.resources | nindent 10 }}
        securityContext:
          {{- toYaml $.Values.securityContext | nindent 10 }}
        volumeMounts:
          - name: sites-dir
            mountPath: /home/frappe/frappe-bench/sites
          - name: logs
            mountPath: /home/frappe/frappe-bench/logs
      restartPolicy: Never
      volumes:
        - name: sites-dir
          {{- if .Values.persistence.worker.enabled }}
          persistentVolumeClaim:
            {{- if .Values.persistence.worker.existingClaim }}
            claimName: {{ .Values.persistence.worker.existingClaim }}
            {{- else }}
            claimName: {{ template "erpnext.fullname" . }}
            {{- end }}
            readOnly: false
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: logs
          {{- if .Values.persistence.logs.enabled }}
          persistentVolumeClaim:
            {{- if .Values.persistence.logs.existingClaim }}
            claimName: {{ .Values.persistence.logs.existingClaim }}
            {{- else }}
            claimName: {{ template "erpnext.fullname" . }}-logs
            {{- end }}
            readOnly: false
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.jobs.createSite.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.jobs.createSite.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.jobs.createSite.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
