{{- if and .Values.tenant.enabled .Values.tenant.externalSecrets.enabled }}
{{- $t := .Values.tenant -}}
{{- $es := $t.externalSecrets -}}
{{- $ns := .Release.Namespace -}}
{{- $mount := $t.vault.mountPath | default "secret" -}}
# ── CA trust bundle (root + intermediate) from the k8s-token-auth store ──────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: apps-ca-trust
  namespace: {{ $ns }}
  labels:
    {{- include "erpnext.labels" . | nindent 4 }}
  finalizers:
    - externalsecrets.external-secrets.io/externalsecret-cleanup
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $es.caStore | default "kubernetes-token-auth" }}
  target:
    name: apps-ca-trust
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      type: Opaque
      data:
        ca.crt: |
          {{ printf "{{ .root_ca }}" }}
          {{ printf "{{ .intermediate_ca }}" }}
        intermediate.crt: |
          {{ printf "{{ .intermediate_ca }}" }}
        root.crt: |
          {{ printf "{{ .root_ca }}" }}
  data:
    - secretKey: root_ca
      remoteRef: { key: root-ca-secret, property: tls.crt }
    - secretKey: intermediate_ca
      remoteRef: { key: apps-int-ca-secret, property: tls.crt }
---
# ── MariaDB root password (Vault kv) ─────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $ns }}-mariadb-root
  namespace: {{ $ns }}
  labels:
    {{- include "erpnext.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $es.vaultStore | default "vault-backend" }}
  target:
    name: {{ $ns }}-mariadb-root
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      data:
        mariadb-root-password: {{ printf "{{ index . \"mariadb-root-password\" }}" | quote }}
  data:
    - secretKey: mariadb-root-password
      remoteRef:
        key: {{ $mount }}/data/{{ $ns }}/{{ $ns }}-mariadb-root
        property: mariadb-root-password
---
# ── MinIO credentials (Vault kv) ─────────────────────────────────────────────────
{{- if $t.minio.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $ns }}-minio-creds
  namespace: {{ $ns }}
  labels:
    {{- include "erpnext.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $es.vaultStore | default "vault-backend" }}
  target:
    name: {{ $ns }}-minio-creds
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        accesskey: {{ printf "{{ .accesskey }}" | quote }}
        secretkey: {{ printf "{{ .secretkey }}" | quote }}
        config.env: |
          export MINIO_ROOT_USER="{{ printf "{{ .accesskey }}" }}"
          export MINIO_ROOT_PASSWORD="{{ printf "{{ .secretkey }}" }}"
  data:
    - secretKey: accesskey
      remoteRef: { key: {{ $mount }}/data/{{ $ns }}/minio-creds, property: accesskey }
    - secretKey: secretkey
      remoteRef: { key: {{ $mount }}/data/{{ $ns }}/minio-creds, property: secretkey }
---
{{- end }}
# ── GHCR image pull credentials (shared Vault path) ──────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-cred
  namespace: {{ $ns }}
  labels:
    {{- include "erpnext.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $es.vaultStore | default "vault-backend" }}
  target:
    name: ghcr-cred
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: {{ printf "{{ .config }}" | quote }}
  data:
    - secretKey: config
      remoteRef:
        key: {{ $es.ghcrVaultKey | default "secret/data/github/ghcr-cred" }}
        property: config
{{- end }}
