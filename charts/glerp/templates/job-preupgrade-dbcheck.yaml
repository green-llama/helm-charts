{{- if .Values.jobs.createSite.enabled }}
{{- /*
  Pre-upgrade guard: before Helm applies an upgrade to an existing release, verify the
  database is reachable. If it isn't, this hook FAILS and Helm aborts the upgrade — so we
  never proceed to install apps / migrate against a missing or unreachable DB and leave the
  site half-migrated. Only runs on `helm upgrade` (not first install).
*/ -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "erpnext.fullname" . }}-preupgrade-dbcheck
  labels:
    {{- include "erpnext.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  template:
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      containers:
        - name: dbcheck
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "Pre-upgrade: checking database reachability at ${DB_HOST}:${DB_PORT} ..."
              wait-for-it -t 60 "${DB_HOST}:${DB_PORT}"
              echo "Database reachable — upgrade may proceed."
          env:
            - name: DB_HOST
              {{- if (get .Values "mariadb-sts").enabled }}
              value: {{ include "erpnext.fullname" . }}-mariadb-sts
              {{- else if (get .Values "postgresql-sts").enabled }}
              value: {{ include "erpnext.fullname" . }}-postgresql-sts
              {{- else }}
              value: "{{ .Values.dbHost }}"
              {{- end }}
            - name: DB_PORT
              {{- if (get .Values "mariadb-sts").enabled }}
              value: "3306"
              {{- else if (get .Values "postgresql-sts").enabled }}
              value: "5432"
              {{- else if .Values.dbPort }}
              value: {{ .Values.dbPort | quote }}
              {{- else }}
              value: "3306"
              {{- end }}
{{- end }}
