{{- if .Values.zapScan.enabled }}
{{- range .Values.scanTargets }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "glerp-security.fullname" $ }}-zap-{{ .name | lower | replace "_" "-" }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "glerp-security.labels" $ | nindent 4 }}
    app.kubernetes.io/component: zap-scan
    glerp-security/scan-target: {{ .name | quote }}
  annotations:
    glerp-security/target-url: {{ .url | quote }}
spec:
  schedule: {{ $.Values.zapScan.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "glerp-security.selectorLabels" $ | nindent 12 }}
            app.kubernetes.io/component: zap-scan
            glerp-security/scan-target: {{ .name | quote }}
        spec:
          restartPolicy: Never
          securityContext:
            runAsUser: 1000
            fsGroup: 1000

          containers:
            - name: zap-scan
              image: {{ $.Values.zapScan.image | quote }}
              imagePullPolicy: {{ $.Values.zapScan.imagePullPolicy }}
              {{- if eq $.Values.zapScan.scanType "full" }}
              command:
                - zap-full-scan.py
                - -t
                - {{ .url | quote }}
                - -r
                - "zap-{{ .name }}-$(date +%Y%m%d-%H%M%S).html"
                - -J
                - "zap-{{ .name }}-$(date +%Y%m%d-%H%M%S).json"
                - -I
                - -m
                - "60"
              {{- else }}
              command:
                - zap-baseline.py
                - -t
                - {{ .url | quote }}
                - -r
                - "zap-{{ .name }}-$(date +%Y%m%d-%H%M%S).html"
                - -J
                - "zap-{{ .name }}-$(date +%Y%m%d-%H%M%S).json"
                - -I
              {{- end }}
              env:
                - name: ZAP_TARGET
                  value: {{ .url | quote }}
                - name: ZAP_SCAN_TYPE
                  value: {{ $.Values.zapScan.scanType | quote }}
              resources:
                {{- toYaml $.Values.zapScan.resources | nindent 16 }}
              volumeMounts:
                # ZAP requires report files be written inside /zap/wrk
                - name: reports
                  mountPath: /zap/wrk

          volumes:
            - name: reports
              persistentVolumeClaim:
                claimName: {{ include "glerp-security.fullname" $ }}-reports
{{- end }}
{{- end }}
