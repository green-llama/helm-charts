apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "glerp-security.fullname" . }}-scanner
  labels:
    {{- include "glerp-security.labels" . | nindent 4 }}
    app.kubernetes.io/component: kube-bench
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "glerp-security.fullname" . }}-scanner
subjects:
  - kind: ServiceAccount
    name: {{ include "glerp-security.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
