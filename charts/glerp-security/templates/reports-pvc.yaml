apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "glerp-security.fullname" . }}-reports
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glerp-security.labels" . | nindent 4 }}
    app.kubernetes.io/component: report-storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.reports.storageSize }}
  {{- if .Values.reports.storageClassName }}
  storageClassName: {{ .Values.reports.storageClassName }}
  {{- end }}
