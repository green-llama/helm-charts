apiVersion: apps/v1
kind: Deployment
metadata:
  name: intake-api
  namespace: {{ .Values.namespace }}
  labels:
    app: intake-api
    app.kubernetes.io/part-of: glerp-ai-intake
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.apiReplicas }}
  selector:
    matchLabels:
      app: intake-api
  template:
    metadata:
      labels:
        app: intake-api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: intake-config
            - secretRef:
                name: {{ .Values.existingSecret }}
                optional: true
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: intake-api
  namespace: {{ .Values.namespace }}
  labels:
    app: intake-api
    app.kubernetes.io/part-of: glerp-ai-intake
spec:
  selector:
    app: intake-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
