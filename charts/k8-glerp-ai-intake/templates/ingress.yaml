{{- if .Values.ingress.enabled }}
---
# Traefik IngressRoute — exposes the API and MCP endpoints
# Set ingress.host in values.yaml or via --set ingress.host=<hostname>
# TLS secret must exist in the namespace (cert-manager or static).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Values.ingress.middlewareName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: glerp-ai-intake
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  stripPrefix:
    prefixes:
      - /intake
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: intake-api-route
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
  labels:
    app.kubernetes.io/part-of: glerp-ai-intake
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  entryPoints:
    - websecure
  tls:
    secretName: letsencrypt-greenllama-tech-tls
  routes:
    - match: (Host(`{{ .Values.ingress.host }}`)) && PathPrefix(`/intake/api`)
      kind: Rule
      services:
        - name: intake-api
          port: 80
      middlewares:
        - name: {{ .Values.ingress.middlewareName }}
    - match: (Host(`{{ .Values.ingress.host }}`)) && PathPrefix(`/intake/mcp`)
      kind: Rule
      services:
        - name: intake-api
          port: 80
      middlewares:
        - name: {{ .Values.ingress.middlewareName }}
    - match: (Host(`{{ .Values.ingress.host }}`)) && PathPrefix(`/intake/admin`)
      kind: Rule
      services:
        - name: intake-api
          port: 80
      middlewares:
        - name: {{ .Values.ingress.middlewareName }}
    - match: (Host(`{{ .Values.ingress.host }}`)) && (Path(`/intake/healthz`) || Path(`/intake/readyz`))
      kind: Rule
      services:
        - name: intake-api
          port: 80
      middlewares:
        - name: {{ .Values.ingress.middlewareName }}
{{- end }}
