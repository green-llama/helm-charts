{{- if .Values.ingress.enabled }}
{{- $host := printf "%s.%s" .Values.namespace .Values.ingress.domain }}
---
# Traefik IngressRoute — exposes the API and MCP endpoints
# Set ingress.domain in values or via --set ingress.domain=<domain>
# FQDN is auto-computed as <namespace>.<domain>
# TLS secret must exist in the namespace (cert-manager or static).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Values.ingress.middlewareName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: glerp-ai-intake
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  stripPrefix:
    prefixes:
      - /intake
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: intake-api-route
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
    external-dns.alpha.kubernetes.io/hostname: {{ $host }}
    external-dns.alpha.kubernetes.io/target: {{ .Values.ingress.externalDnsTarget }}
  labels:
    app.kubernetes.io/part-of: glerp-ai-intake
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  entryPoints:
    - websecure
  tls:
    secretName: letsencrypt-greenllama-tech-tls
  routes:
    - match: (Host(`{{ $host }}`)) && PathPrefix(`/intake/api`)
      kind: Rule
      services:
        - name: intake-api
          port: 80
      middlewares:
        - name: {{ .Values.ingress.middlewareName }}
    - match: (Host(`{{ $host }}`)) && PathPrefix(`/intake/mcp`)
      kind: Rule
      services:
        - name: intake-api
          port: 80
      middlewares:
        - name: {{ .Values.ingress.middlewareName }}
    - match: (Host(`{{ $host }}`)) && PathPrefix(`/intake/admin`)
      kind: Rule
      services:
        - name: intake-api
          port: 80
      middlewares:
        - name: {{ .Values.ingress.middlewareName }}
    - match: (Host(`{{ $host }}`)) && (Path(`/intake/healthz`) || Path(`/intake/readyz`))
      kind: Rule
      services:
        - name: intake-api
          port: 80
      middlewares:
        - name: {{ .Values.ingress.middlewareName }}
{{- end }}
