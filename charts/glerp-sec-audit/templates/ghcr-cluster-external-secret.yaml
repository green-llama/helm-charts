{{- if and .Values.ghcrRegistryAuth.enabled .Values.ghcrRegistryAuth.eso.enabled .Values.ghcrRegistryAuth.eso.clusterExternalSecret.enabled }}
# ClusterExternalSecret: distributes GHCR credentials to every namespace labeled
# glerp.io/private-registry=true. New GLerp app namespaces just need the label —
# the Secret appears automatically within the refreshTime window.
#
# This satisfies two needs at once:
#   1. Pod image pulls   — kubelet uses ghcr-scan-credentials as an imagePullSecret
#   2. Trivy scanning    — Trivy Operator scan pods inherit credentials via
#                          trivyOperator.scanJobAdditionalEnvVars
#
# Label the release namespace itself so Trivy gets credentials here too:
#   kubectl label namespace {{ .Release.Namespace }} glerp.io/private-registry=true
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: {{ include "glerp-sec-audit.fullname" . }}-ghcr-credentials
  labels:
    {{- include "glerp-sec-audit.labels" . | nindent 4 }}
spec:
  namespaceSelector:
    {{- toYaml .Values.ghcrRegistryAuth.eso.clusterExternalSecret.namespaceSelector | nindent 4 }}
  refreshTime: 1h
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: {{ required "ghcrRegistryAuth.eso.clusterSecretStoreName is required when clusterExternalSecret.enabled=true" .Values.ghcrRegistryAuth.eso.clusterSecretStoreName }}
      kind: ClusterSecretStore
    target:
      name: {{ .Values.ghcrRegistryAuth.secretName }}
      creationPolicy: Owner
    data:
      - secretKey: username
        remoteRef:
          key: {{ required "ghcrRegistryAuth.eso.remoteRef.key is required when clusterExternalSecret.enabled=true" .Values.ghcrRegistryAuth.eso.remoteRef.key }}
          property: {{ .Values.ghcrRegistryAuth.eso.remoteRef.usernameProperty }}
      - secretKey: password
        remoteRef:
          key: {{ .Values.ghcrRegistryAuth.eso.remoteRef.key }}
          property: {{ .Values.ghcrRegistryAuth.eso.remoteRef.passwordProperty }}
{{- end }}
