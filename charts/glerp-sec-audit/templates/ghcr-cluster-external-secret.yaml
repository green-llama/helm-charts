{{- if and .Values.ghcrRegistryAuth.enabled .Values.ghcrRegistryAuth.eso.enabled .Values.ghcrRegistryAuth.eso.clusterExternalSecret.enabled }}
# ClusterExternalSecret: ESO distributes ghcr-pull-secret to every namespace labeled
# glerp.io/private-registry=true. This satisfies two needs at once:
#   1. Pod image pulls — kubelet uses ghcr-pull-secret as an imagePullSecret
#   2. Trivy scanning  — scan pods inherit GHCR credentials via scanJobAdditionalEnvVars
#
# Adding a new GLerp app namespace requires only:
#   kubectl label namespace <ns> glerp.io/private-registry=true
# ESO syncs the Secret within the refreshTime window; no other steps needed.
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: {{ include "glerp-sec-audit.fullname" . }}-ghcr-credentials
  labels:
    {{- include "glerp-sec-audit.labels" . | nindent 4 }}
spec:
  namespaceSelector:
    {{- toYaml .Values.ghcrRegistryAuth.eso.clusterExternalSecret.namespaceSelector | nindent 4 }}
  refreshTime: 1h
  externalSecretSpec:
    refreshInterval: 1h
    secretStoreRef:
      name: {{ required "ghcrRegistryAuth.eso.clusterSecretStoreName is required when clusterExternalSecret.enabled=true" .Values.ghcrRegistryAuth.eso.clusterSecretStoreName }}
      kind: ClusterSecretStore
    target:
      name: {{ .Values.ghcrRegistryAuth.secretName }}
      creationPolicy: Owner
    data:
      - secretKey: {{ .Values.ghcrRegistryAuth.eso.usernameKey }}
        remoteRef:
          key: {{ .Values.ghcrRegistryAuth.secretName }}     # source Kubernetes Secret name
          property: {{ .Values.ghcrRegistryAuth.eso.usernameKey }}
      - secretKey: {{ .Values.ghcrRegistryAuth.eso.passwordKey }}
        remoteRef:
          key: {{ .Values.ghcrRegistryAuth.secretName }}
          property: {{ .Values.ghcrRegistryAuth.eso.passwordKey }}
{{- end }}
