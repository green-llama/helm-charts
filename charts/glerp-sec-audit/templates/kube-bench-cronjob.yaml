{{- if .Values.kubeBench.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "glerp-sec-audit.fullname" . }}-kube-bench
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glerp-sec-audit.labels" . | nindent 4 }}
    app.kubernetes.io/component: kube-bench
spec:
  schedule: {{ .Values.kubeBench.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "glerp-sec-audit.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: kube-bench
        spec:
          serviceAccountName: {{ include "glerp-sec-audit.serviceAccountName" . }}
          restartPolicy: Never
          priorityClassName: {{ .Values.scanPriorityClassName }}
          hostPID: true
          hostNetwork: false
          securityContext:
            seLinuxOptions:
              type: "spc_t"

          # kube-bench runs on worker nodes (control-plane excluded by affinity).
          # Worker-node CIS checks cover kubelet config and node hardening.
          # etcd/API server host paths are mounted via DirectoryOrCreate — on workers these
          # will be empty so those control-plane checks are skipped by kube-bench automatically.
          # Results are pushed to Pushgateway (Grafana evidence); emptyDir is discarded after the job.
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: DoesNotExist

          tolerations:
            - operator: Exists

          containers:
            - name: kube-bench
              image: {{ .Values.kubeBench.image | quote }}
              imagePullPolicy: {{ .Values.kubeBench.imagePullPolicy }}

              securityContext:
                privileged: true
                runAsUser: 0

              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  REPORT_FILE="/tmp/kube-bench-$(date +%Y%m%d-%H%M%S).json"
                  echo "Running kube-bench benchmark: {{ .Values.kubeBench.benchmark }}"
                  kube-bench run \
                    --benchmark {{ .Values.kubeBench.benchmark }} \
                    --json \
                    --outputfile "${REPORT_FILE}"

                  echo "Report written to ${REPORT_FILE}"

                  # Push summary counts to Prometheus Pushgateway
                  PASS=$(python3 -c "import json,sys; d=json.load(open('${REPORT_FILE}')); print(sum(t['total_pass'] for t in d.get('Controls',[])))" 2>/dev/null || echo 0)
                  FAIL=$(python3 -c "import json,sys; d=json.load(open('${REPORT_FILE}')); print(sum(t['total_fail'] for t in d.get('Controls',[])))" 2>/dev/null || echo 0)
                  WARN=$(python3 -c "import json,sys; d=json.load(open('${REPORT_FILE}')); print(sum(t['total_warn'] for t in d.get('Controls',[])))" 2>/dev/null || echo 0)

                  PUSHGW="{{ include "glerp-sec-audit.pushgatewayUrl" . }}"
                  python3 -c "
                  import urllib.request, socket
                  url = '${PUSHGW}/metrics/job/kube-bench/instance/' + socket.gethostname()
                  body = '# TYPE kube_bench_total_pass gauge\nkube_bench_total_pass ${PASS}\n# TYPE kube_bench_total_fail gauge\nkube_bench_total_fail ${FAIL}\n# TYPE kube_bench_total_warn gauge\nkube_bench_total_warn ${WARN}\n'
                  urllib.request.urlopen(urllib.request.Request(url, data=body.encode(), method='POST'), timeout=10)
                  print('Pushed metrics to', url)
                  "

                  echo "Pushed metrics to Pushgateway — PASS=${PASS} FAIL=${FAIL} WARN=${WARN}"

              resources:
                {{- toYaml .Values.kubeBench.resources | nindent 16 }}

              volumeMounts:
                - name: kube-bench-tmp
                  mountPath: /tmp
                # RKE2 control-plane config
                - name: etc-rancher-rke2
                  mountPath: /etc/rancher/rke2
                  readOnly: true
                - name: var-lib-rancher-rke2
                  mountPath: /var/lib/rancher/rke2
                  readOnly: true
                # Standard Kubernetes paths (kube-bench expects these)
                - name: etc-kubernetes
                  mountPath: /etc/kubernetes
                  readOnly: true
                - name: var-lib-kubelet
                  mountPath: /var/lib/kubelet
                  readOnly: true
                - name: var-lib-etcd
                  mountPath: /var/lib/etcd
                  readOnly: true
                - name: etc-systemd
                  mountPath: /etc/systemd
                  readOnly: true
                - name: lib-systemd
                  mountPath: /lib/systemd
                  readOnly: true
                # /proc is intentionally not mounted — hostPID: true already shares the host
                # PID namespace so the container's native /proc reflects host processes.
                # Explicitly mounting host /proc as readOnly prevented runc from writing
                # the SELinux process label to /proc/thread-self/attr/exec during container init.

          volumes:
            - name: kube-bench-tmp
              emptyDir: {}
            - name: etc-rancher-rke2
              hostPath:
                path: /etc/rancher/rke2
                type: DirectoryOrCreate
            - name: var-lib-rancher-rke2
              hostPath:
                path: /var/lib/rancher/rke2
                type: DirectoryOrCreate
            - name: etc-kubernetes
              hostPath:
                path: /etc/kubernetes
                type: DirectoryOrCreate
            - name: var-lib-kubelet
              hostPath:
                path: /var/lib/kubelet
                type: DirectoryOrCreate
            - name: var-lib-etcd
              hostPath:
                path: /var/lib/etcd
                type: DirectoryOrCreate
            - name: etc-systemd
              hostPath:
                path: /etc/systemd
            - name: lib-systemd
              hostPath:
                path: /lib/systemd
{{- end }}
