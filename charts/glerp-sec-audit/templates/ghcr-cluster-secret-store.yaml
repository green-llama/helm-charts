{{- if and .Values.ghcrRegistryAuth.enabled .Values.ghcrRegistryAuth.eso.enabled }}
# ClusterSecretStore: ESO Kubernetes provider reading ghcr-pull-secret from
# sourceNamespace. Chart manages this resource — no manual kubectl apply needed.
# Prerequisite: Role + RoleBinding granting controllerServiceAccount read access
# to the secret in sourceNamespace (see NOTES.txt Step 1).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.ghcrRegistryAuth.eso.clusterSecretStoreName }}
  labels:
    {{- include "glerp-sec-audit.labels" . | nindent 4 }}
spec:
  provider:
    kubernetes:
      remoteNamespace: {{ .Values.ghcrRegistryAuth.eso.sourceNamespace }}
      server:
        url: "https://kubernetes.default.svc"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
          namespace: {{ .Values.ghcrRegistryAuth.eso.controllerNamespace }}
      auth:
        serviceAccount:
          name: {{ .Values.ghcrRegistryAuth.eso.controllerServiceAccount }}
          namespace: {{ .Values.ghcrRegistryAuth.eso.controllerNamespace }}
{{- end }}
