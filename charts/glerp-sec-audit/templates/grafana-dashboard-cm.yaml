{{- if .Values.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "glerp-sec-audit.fullname" . }}-grafana-dashboard
  namespace: {{ .Values.grafanaDashboard.namespace }}
  labels:
    grafana_dashboard: {{ .Values.grafanaDashboard.dashboardLabel | quote }}
    {{- include "glerp-sec-audit.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana-dashboard
  annotations:
    grafana_folder: {{ .Values.grafanaDashboard.folderName | quote }}
data:
  glerp-sec-audit.json: |
    {
      "__inputs": [],
      "__requires": [
        { "type": "grafana", "id": "grafana", "name": "Grafana", "version": "9.0.0" },
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" }
      ],
      "annotations": { "list": [] },
      "description": "GLerp Security — CIS/SOC2 Compliance Dashboard. Powered by Trivy Operator, kube-bench, and OWASP ZAP.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [
        {
          "icon": "external link",
          "tags": [],
          "targetBlank": true,
          "title": "Security Reports",
          "tooltip": "Browse kube-bench and ZAP HTML reports",
          "type": "link",
          "url": "https://{{ .Values.reportHostname }}/security/"
        }
      ],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "title": "Vulnerability Summary",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "orange", "value": 5 },
                  { "color": "red", "value": 10 }
                ]
              }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "CRITICAL" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "HIGH" },     "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "MEDIUM" },   "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "LOW" },      "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] }
            ]
          },
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 1 },
          "id": 2,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "title": "CVEs by Severity (All Namespaces)",
          "type": "stat",
          "targets": [
            { "expr": "sum(trivy_image_vulnerabilities{severity=\"CRITICAL\"}) or vector(0)", "legendFormat": "CRITICAL", "refId": "A" },
            { "expr": "sum(trivy_image_vulnerabilities{severity=\"HIGH\"}) or vector(0)",    "legendFormat": "HIGH",     "refId": "B" },
            { "expr": "sum(trivy_image_vulnerabilities{severity=\"MEDIUM\"}) or vector(0)",  "legendFormat": "MEDIUM",   "refId": "C" },
            { "expr": "sum(trivy_image_vulnerabilities{severity=\"LOW\"}) or vector(0)",     "legendFormat": "LOW",      "refId": "D" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 2 } } },
          "gridPos": { "h": 5, "w": 9, "x": 6, "y": 1 },
          "id": 3,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Critical CVE Trend Over Time",
          "type": "timeseries",
          "targets": [
            { "expr": "sum(trivy_image_vulnerabilities{severity=\"CRITICAL\"}) or vector(0)", "legendFormat": "Critical CVEs", "refId": "A" },
            { "expr": "sum(trivy_image_vulnerabilities{severity=\"HIGH\"}) or vector(0)",    "legendFormat": "High CVEs",     "refId": "B" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red",    "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "green",  "value": 80 }
                ]
              },
              "unit": "percent",
              "min": 0,
              "max": 100
            }
          },
          "gridPos": { "h": 5, "w": 4, "x": 15, "y": 1 },
          "id": 4,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": true, "showThresholdMarkers": true },
          "title": "CIS K8s Compliance Score",
          "type": "gauge",
          "targets": [
            {
              "expr": "100 * sum(trivy_compliance_info{status=\"PASS\"}) / (sum(trivy_compliance_info{status=\"PASS\"}) + sum(trivy_compliance_info{status=\"FAIL\"}) + 0.001)",
              "legendFormat": "Compliance %",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } } },
          "gridPos": { "h": 5, "w": 5, "x": 19, "y": 1 },
          "id": 5,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "CIS Compliance Checks",
          "type": "stat",
          "targets": [
            { "expr": "sum(trivy_compliance_info{status=\"PASS\"}) or vector(0)",    "legendFormat": "PASS",    "refId": "A" },
            { "expr": "sum(trivy_compliance_info{status=\"FAIL\"}) or vector(0)",    "legendFormat": "FAIL",    "refId": "B" },
            { "expr": "sum(trivy_compliance_info{status=\"WARNING\"}) or vector(0)", "legendFormat": "WARNING", "refId": "C" }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 6 },
          "id": 6,
          "title": "Config Audit & RBAC",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto", "displayMode": "auto" } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "namespace" }, "properties": [{ "id": "custom.width", "value": 200 }] },
              { "matcher": { "id": "byName", "options": "severity" },  "properties": [{ "id": "custom.width", "value": 100 }] },
              { "matcher": { "id": "byName", "options": "Value" },     "properties": [{ "id": "custom.width", "value": 80 }, { "id": "color", "value": { "mode": "thresholds" } }, { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } }, { "id": "custom.displayMode", "value": "color-background" }] }
            ]
          },
          "gridPos": { "h": 7, "w": 12, "x": 0, "y": 7 },
          "id": 7,
          "options": { "footer": { "show": false }, "showHeader": true, "sortBy": [{ "desc": true, "displayName": "Value" }] },
          "title": "Config Audit Findings by Namespace",
          "type": "table",
          "targets": [
            {
              "expr": "sum by (namespace, severity) (trivy_resource_configaudits) > 0",
              "legendFormat": "{{ "{{namespace}}" }} / {{ "{{severity}}" }}",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "namespace": "Namespace", "severity": "Severity", "Value": "Findings" } } }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto", "displayMode": "auto" } }
          },
          "gridPos": { "h": 7, "w": 12, "x": 12, "y": 7 },
          "id": 8,
          "options": { "footer": { "show": false }, "showHeader": true, "sortBy": [{ "desc": true, "displayName": "Value" }] },
          "title": "CVEs by Namespace / Image",
          "type": "table",
          "targets": [
            {
              "expr": "sum by (namespace, image_tag, severity) (trivy_image_vulnerabilities{severity=~\"CRITICAL|HIGH\"}) > 0",
              "legendFormat": "",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "namespace": "Namespace", "image_tag": "Image", "severity": "Severity", "Value": "CVEs" } } }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 9,
          "title": "kube-bench — CIS Kubernetes Benchmark (Node)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] }
            }
          },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 15 },
          "id": 10,
          "options": { "colorMode": "background", "graphMode": "area", "justifyMode": "center", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "kube-bench Last Run",
          "type": "stat",
          "targets": [
            { "expr": "kube_bench_total_pass",    "legendFormat": "PASS",    "refId": "A" },
            { "expr": "kube_bench_total_fail",    "legendFormat": "FAIL",    "refId": "B" },
            { "expr": "kube_bench_total_warn",    "legendFormat": "WARN",    "refId": "C" }
          ]
        },
        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 2 } } },
          "gridPos": { "h": 4, "w": 16, "x": 8, "y": 15 },
          "id": 11,
          "options": { "legend": { "displayMode": "list", "placement": "right" }, "tooltip": { "mode": "multi" } },
          "title": "kube-bench Results Over Time",
          "type": "timeseries",
          "targets": [
            { "expr": "kube_bench_total_pass", "legendFormat": "PASS", "refId": "A" },
            { "expr": "kube_bench_total_fail", "legendFormat": "FAIL", "refId": "B" },
            { "expr": "kube_bench_total_warn", "legendFormat": "WARN", "refId": "C" }
          ]
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 19 },
          "id": 12,
          "title": "OWASP ZAP — Web Application Scan Reports",
          "type": "row"
        },
        {
          "gridPos": { "h": 4, "w": 24, "x": 0, "y": 20 },
          "id": 13,
          "options": {
            "content": "{{ range .Values.scanTargets }}## [{{ .name }} — Latest ZAP Report](https://{{ $.Values.reportHostname }}/security/{{ .name }}/)\n\nTarget: `{{ .url }}`  \nScan type: `{{ $.Values.zapScan.scanType }}`  \nSchedule: `{{ $.Values.zapScan.schedule }}` (weekly)\n\n{{ end }}\n\n**Browse all reports:** [{{ .Values.reportHostname }}/security/](https://{{ .Values.reportHostname }}/security/)",
            "mode": "markdown"
          },
          "title": "GLerp Scan Targets & Report Links",
          "type": "text"
        }
      ],
      "refresh": "5m",
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["security", "cis", "soc2", "trivy", "kube-bench", "zap", "glerp"],
      "templating": {
        "list": [
          {
            "current": {},
            "hide": 0,
            "includeAll": false,
            "name": "datasource",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "type": "datasource"
          }
        ]
      },
      "time": { "from": "now-7d", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "GLerp Security — CIS/SOC2 Compliance",
      "uid": "glerp-sec-audit-cis",
      "version": 1
    }
{{- end }}
