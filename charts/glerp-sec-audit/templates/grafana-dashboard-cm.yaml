            { "expr": "sum by (risk) (zap_alerts_total{job=\"zap\", risk=\"Low\"})",           "legendFormat": "Low",           "refId": "C" },
            { "expr": "sum by (risk) (zap_alerts_total{job=\"zap\", risk=\"Informational\"})", "legendFormat": "Informational", "refId": "D" }
          ]
        },

