{{- if .Values.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "glerp-sec-audit.fullname" . }}-grafana-dashboard
  namespace: {{ .Values.grafanaDashboard.namespace }}
  labels:
    grafana_dashboard: {{ .Values.grafanaDashboard.dashboardLabel | quote }}
    {{- include "glerp-sec-audit.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana-dashboard
  annotations:
    grafana_folder: {{ .Values.grafanaDashboard.folderName | quote }}
data:
  glerp-sec-audit.json: |
    {
      "__inputs": [],
      "__requires": [
        { "type": "grafana", "id": "grafana", "name": "Grafana", "version": "9.0.0" },
        { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" }
      ],
      "annotations": { "list": [] },
      "description": "GLerp Security — CIS/SOC2 Compliance Dashboard. Powered by Trivy Operator, kube-bench, and OWASP ZAP.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [
        {
          "icon": "external link",
          "tags": [],
          "targetBlank": true,
          "title": "Security Reports",
          "tooltip": "Browse kube-bench and ZAP HTML reports",
          "type": "link",
          "url": "https://{{ .Values.reportHostname }}{{ if .Values.reportPort }}:{{ .Values.reportPort }}{{ end }}/security/"
        }
      ],
      "panels": [

        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }, "id": 1, "title": "Vulnerability Summary", "type": "row" },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "fixed" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "CRITICAL" }, "properties": [{ "id": "color", "value": { "fixedColor": "dark-red",  "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "HIGH" },     "properties": [{ "id": "color", "value": { "fixedColor": "orange",    "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "MEDIUM" },   "properties": [{ "id": "color", "value": { "fixedColor": "yellow",    "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "LOW" },      "properties": [{ "id": "color", "value": { "fixedColor": "green",     "mode": "fixed" } }] }
            ]
          },
          "gridPos": { "h": 6, "w": 5, "x": 0, "y": 1 },
          "id": 2,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "textMode": "auto" },
          "title": "CVEs by Severity (All Namespaces)",
          "description": "Counts from trivy_image_vulnerabilities. Shows 0 until VulnerabilityReports are generated — expand Diagnostics to check scan status.",
          "type": "stat",
          "targets": [
            { "expr": "sum(trivy_image_vulnerabilities{severity=\"CRITICAL\"}) or vector(0)", "legendFormat": "CRITICAL", "refId": "A" },
            { "expr": "sum(trivy_image_vulnerabilities{severity=\"HIGH\"}) or vector(0)",    "legendFormat": "HIGH",     "refId": "B" },
            { "expr": "sum(trivy_image_vulnerabilities{severity=\"MEDIUM\"}) or vector(0)",  "legendFormat": "MEDIUM",   "refId": "C" },
            { "expr": "sum(trivy_image_vulnerabilities{severity=\"LOW\"}) or vector(0)",     "legendFormat": "LOW",      "refId": "D" }
          ]
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 2 } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Critical CVEs" }, "properties": [{ "id": "color", "value": { "fixedColor": "dark-red", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "High CVEs" },     "properties": [{ "id": "color", "value": { "fixedColor": "orange",   "mode": "fixed" } }] }
            ]
          },
          "gridPos": { "h": 6, "w": 10, "x": 5, "y": 1 },
          "id": 3,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Critical CVE Trend Over Time",
          "type": "timeseries",
          "targets": [
            { "expr": "sum(trivy_image_vulnerabilities{severity=\"CRITICAL\"}) or vector(0)", "legendFormat": "Critical CVEs", "refId": "A" },
            { "expr": "sum(trivy_image_vulnerabilities{severity=\"HIGH\"}) or vector(0)",    "legendFormat": "High CVEs",     "refId": "B" }
          ]
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 60 }, { "color": "green", "value": 80 }] },
              "unit": "percent", "min": 0, "max": 100
            }
          },
          "gridPos": { "h": 6, "w": 4, "x": 15, "y": 1 },
          "id": 4,
          "options": { "orientation": "auto", "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": true, "showThresholdMarkers": true },
          "title": "CIS K8s Compliance Score",
          "type": "gauge",
          "targets": [
            {
              "expr": "100 * sum(trivy_cluster_compliance{status=\"Pass\"}) / (sum(trivy_cluster_compliance{status=\"Pass\"}) + sum(trivy_cluster_compliance{status=\"Fail\"}) + 0.001)",
              "legendFormat": "Compliance %", "refId": "A"
            }
          ]
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "fixed" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "PASS" }, "properties": [{ "id": "color", "value": { "fixedColor": "green",            "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "FAIL" }, "properties": [{ "id": "color", "value": { "fixedColor": "red",              "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "WARN" }, "properties": [{ "id": "color", "value": { "fixedColor": "semi-dark-yellow", "mode": "fixed" } }] }
            ]
          },
          "gridPos": { "h": 6, "w": 5, "x": 19, "y": 1 },
          "id": 5,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "CIS Compliance Checks",
          "type": "stat",
          "targets": [
            { "expr": "sum(trivy_cluster_compliance{status=\"Pass\"}) or vector(0)", "legendFormat": "PASS", "refId": "A" },
            { "expr": "sum(trivy_cluster_compliance{status=\"Fail\"}) or vector(0)", "legendFormat": "FAIL", "refId": "B" },
            { "expr": "sum(trivy_cluster_compliance{status=\"Warn\"}) or vector(0)", "legendFormat": "WARN", "refId": "C" }
          ]
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto", "displayMode": "auto" } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Namespace" }, "properties": [{ "id": "custom.width", "value": 180 }] },
              { "matcher": { "id": "byName", "options": "Image" },     "properties": [{ "id": "custom.width", "value": 320 }] },
              { "matcher": { "id": "byName", "options": "Severity" },  "properties": [{ "id": "custom.width", "value": 100 }] },
              { "matcher": { "id": "byName", "options": "CVEs" }, "properties": [
                { "id": "custom.width", "value": 80 },
                { "id": "color", "value": { "mode": "thresholds" } },
                { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } },
                { "id": "custom.displayMode", "value": "color-background" }
              ]}
            ]
          },
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 7 },
          "id": 8,
          "options": { "footer": { "show": false }, "showHeader": true, "sortBy": [{ "desc": true, "displayName": "CVEs" }] },
          "title": "CVEs by Namespace / Image (Critical & High)",
          "description": "Empty until VulnerabilityReports are generated — expand Diagnostics to check scan status.",
          "type": "table",
          "targets": [
            {
              "expr": "sum by (namespace, image_tag, severity) (trivy_image_vulnerabilities{severity=~\"CRITICAL|HIGH\"}) > 0",
              "legendFormat": "", "refId": "A", "instant": true, "format": "table"
            }
          ],
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "namespace": "Namespace", "image_tag": "Image", "severity": "Severity", "Value": "CVEs" } } }
          ]
        },

        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 }, "id": 6, "title": "Config Audit & RBAC", "type": "row" },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto", "displayMode": "auto" } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Namespace" }, "properties": [{ "id": "custom.width", "value": 200 }] },
              { "matcher": { "id": "byName", "options": "Severity" },  "properties": [{ "id": "custom.width", "value": 100 }] },
              { "matcher": { "id": "byName", "options": "Findings" }, "properties": [
                { "id": "custom.width", "value": 80 },
                { "id": "color", "value": { "mode": "thresholds" } },
                { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } },
                { "id": "custom.displayMode", "value": "color-background" }
              ]}
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "id": 7,
          "options": { "footer": { "show": false }, "showHeader": true, "sortBy": [{ "desc": true, "displayName": "Findings" }] },
          "title": "Config Audit Findings by Namespace",
          "type": "table",
          "targets": [
            {
              "expr": "sum by (namespace, severity) (trivy_resource_configaudits) > 0",
              "legendFormat": "{{ "{{namespace}}" }} / {{ "{{severity}}" }}",
              "refId": "A", "instant": true, "format": "table"
            }
          ],
          "transformations": [
            { "id": "organize", "options": { "renameByName": { "namespace": "Namespace", "severity": "Severity", "Value": "Findings" } } }
          ]
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 2 } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Critical" }, "properties": [{ "id": "color", "value": { "fixedColor": "dark-red", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "High" },     "properties": [{ "id": "color", "value": { "fixedColor": "orange",   "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Medium" },   "properties": [{ "id": "color", "value": { "fixedColor": "yellow",   "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Low" },      "properties": [{ "id": "color", "value": { "fixedColor": "green",    "mode": "fixed" } }] }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "id": 19,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "Config Audit Findings — Trend Over Time",
          "description": "Cluster-wide config audit findings by severity. A downward trend indicates remediation progress — SOC2 continuous improvement evidence.",
          "type": "timeseries",
          "targets": [
            { "expr": "sum(trivy_resource_configaudits{severity=~\"CRITICAL|Critical\"})", "legendFormat": "Critical", "refId": "A" },
            { "expr": "sum(trivy_resource_configaudits{severity=~\"HIGH|High\"})",         "legendFormat": "High",     "refId": "B" },
            { "expr": "sum(trivy_resource_configaudits{severity=~\"MEDIUM|Medium\"})",     "legendFormat": "Medium",   "refId": "C" },
            { "expr": "sum(trivy_resource_configaudits{severity=~\"LOW|Low\"})",           "legendFormat": "Low",      "refId": "D" }
          ]
        },

        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 23 }, "id": 9, "title": "kube-bench — CIS Kubernetes Benchmark (Node)", "type": "row" },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "fixed" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "PASS" }, "properties": [{ "id": "color", "value": { "fixedColor": "green",            "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "FAIL" }, "properties": [{ "id": "color", "value": { "fixedColor": "red",              "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "WARN" }, "properties": [{ "id": "color", "value": { "fixedColor": "semi-dark-yellow", "mode": "fixed" } }] }
            ]
          },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 24 },
          "id": 10,
          "options": { "colorMode": "background", "graphMode": "area", "justifyMode": "center", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "kube-bench Last Run",
          "type": "stat",
          "targets": [
            { "expr": "max(kube_bench_total_pass)", "legendFormat": "PASS", "refId": "A" },
            { "expr": "max(kube_bench_total_fail)", "legendFormat": "FAIL", "refId": "B" },
            { "expr": "max(kube_bench_total_warn)", "legendFormat": "WARN", "refId": "C" }
          ]
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 2 } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "PASS" }, "properties": [{ "id": "color", "value": { "fixedColor": "green",            "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "FAIL" }, "properties": [{ "id": "color", "value": { "fixedColor": "red",              "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "WARN" }, "properties": [{ "id": "color", "value": { "fixedColor": "semi-dark-yellow", "mode": "fixed" } }] }
            ]
          },
          "gridPos": { "h": 4, "w": 12, "x": 8, "y": 24 },
          "id": 11,
          "options": { "legend": { "displayMode": "list", "placement": "right" }, "tooltip": { "mode": "multi" } },
          "title": "kube-bench Results Over Time",
          "type": "timeseries",
          "targets": [
            { "expr": "max(kube_bench_total_pass)", "legendFormat": "PASS", "refId": "A" },
            { "expr": "max(kube_bench_total_fail)", "legendFormat": "FAIL", "refId": "B" },
            { "expr": "max(kube_bench_total_warn)", "legendFormat": "WARN", "refId": "C" }
          ]
        },

        {
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 24 },
          "id": 14,
          "options": {
            "content": "### kube-bench Reports\n\nFull CIS check-by-check breakdown with PASS/FAIL/WARN reason for each control:\n\n**[Browse kube-bench reports](https://{{ .Values.reportHostname }}{{ if .Values.reportPort }}:{{ .Values.reportPort }}{{ end }}/security/kube-bench/)**\n\nOpen the latest `.txt` file for a human-readable audit trail.",
            "mode": "markdown"
          },
          "title": "Detailed Reports",
          "type": "text"
        },

        { "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 28 }, "id": 12, "title": "OWASP ZAP — Web Application Scan Reports", "type": "row" },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "fixed" }, "mappings": [], "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "High" },          "properties": [{ "id": "color", "value": { "fixedColor": "orange",   "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Medium" },        "properties": [{ "id": "color", "value": { "fixedColor": "yellow",   "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Low" },           "properties": [{ "id": "color", "value": { "fixedColor": "green",    "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Informational" }, "properties": [{ "id": "color", "value": { "fixedColor": "blue",     "mode": "fixed" } }] }
            ]
          },
          "gridPos": { "h": 4, "w": 5, "x": 0, "y": 29 },
          "id": 20,
          "options": { "colorMode": "background", "graphMode": "none", "justifyMode": "center", "orientation": "horizontal", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "ZAP Alert Types — All Targets",
          "description": "Distinct alert types summed across all scan targets. Empty until the first ZAP CronJob runs.",
          "type": "stat",
          "targets": [
            { "expr": "sum(zap_alerts_total{job=\"zap\", risk=\"High\"})          or vector(0)", "legendFormat": "High",          "refId": "A" },
            { "expr": "sum(zap_alerts_total{job=\"zap\", risk=\"Medium\"})        or vector(0)", "legendFormat": "Medium",        "refId": "B" },
            { "expr": "sum(zap_alerts_total{job=\"zap\", risk=\"Low\"})           or vector(0)", "legendFormat": "Low",           "refId": "C" },
            { "expr": "sum(zap_alerts_total{job=\"zap\", risk=\"Informational\"}) or vector(0)", "legendFormat": "Informational", "refId": "D" }
          ]
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 604800000 }, { "color": "red", "value": 1209600000 }] },
              "unit": "dateTimeAsLocal"
            }
          },
          "gridPos": { "h": 4, "w": 4, "x": 5, "y": 29 },
          "id": 21,
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "title": "ZAP Last Scan",
          "description": "Timestamp of the most recent completed ZAP scan across all targets. Yellow = >7 days, Red = >14 days.",
          "type": "stat",
          "targets": [
            { "expr": "max(zap_scan_timestamp_seconds{job=\"zap\"}) * 1000", "legendFormat": "Last scan", "refId": "A" }
          ]
        },

        {
          "gridPos": { "h": 4, "w": 15, "x": 9, "y": 29 },
          "id": 13,
          "options": {
            "content": "{{ range .Values.scanTargets }}### [{{ .name }} — ZAP Reports](https://{{ $.Values.reportHostname }}{{ if $.Values.reportPort }}:{{ $.Values.reportPort }}{{ end }}/security/{{ .name }}/)\nTarget: `{{ .url }}`  |  Scan type: `{{ $.Values.zapScan.scanType }}`  |  Schedule: `{{ $.Values.zapScan.schedule }}`\n\n{{ end }}",
            "mode": "markdown"
          },
          "title": "GLerp Scan Targets & Report Links",
          "type": "text"
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto", "displayMode": "auto" } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Target" },     "properties": [{ "id": "custom.width", "value": 160 }] },
              { "matcher": { "id": "byName", "options": "Risk" },       "properties": [{ "id": "custom.width", "value": 120 }] },
              { "matcher": { "id": "byName", "options": "Alert Types" }, "properties": [
                { "id": "custom.width", "value": 100 },
                { "id": "color", "value": { "mode": "thresholds" } },
                { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "orange", "value": 1 }] } },
                { "id": "custom.displayMode", "value": "color-background" }
              ]},
              { "matcher": { "id": "byName", "options": "Instances" }, "properties": [{ "id": "custom.width", "value": 100 }] }
            ]
          },
          "gridPos": { "h": 7, "w": 10, "x": 0, "y": 33 },
          "id": 22,
          "options": { "footer": { "show": false }, "showHeader": true, "sortBy": [{ "desc": true, "displayName": "Alert Types" }] },
          "title": "ZAP Findings by Target",
          "description": "Per-target breakdown. Alert Types = distinct alert patterns. Instances = total occurrences across all scanned URLs.",
          "type": "table",
          "targets": [
            {
              "expr": "zap_alerts_total{job=\"zap\"} > 0",
              "legendFormat": "", "refId": "A", "instant": true, "format": "table"
            },
            {
              "expr": "zap_alert_instances_total{job=\"zap\"} > 0",
              "legendFormat": "", "refId": "B", "instant": true, "format": "table"
            }
          ],
          "transformations": [
            { "id": "merge", "options": {} },
            { "id": "organize", "options": { "renameByName": { "target": "Target", "risk": "Risk", "Value #A": "Alert Types", "Value #B": "Instances" }, "excludeByName": { "Time": true, "__name__": true, "job": true, "instance": true } } }
          ]
        },

        {
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 2 } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "High" },          "properties": [{ "id": "color", "value": { "fixedColor": "orange",   "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Medium" },        "properties": [{ "id": "color", "value": { "fixedColor": "yellow",   "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Low" },           "properties": [{ "id": "color", "value": { "fixedColor": "green",    "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "Informational" }, "properties": [{ "id": "color", "value": { "fixedColor": "blue",     "mode": "fixed" } }] }
            ]
          },
          "gridPos": { "h": 7, "w": 14, "x": 10, "y": 33 },
          "id": 23,
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "title": "ZAP Findings — Trend Over Time",
          "description": "Weekly data points (one per scan). Downward trend = remediation progress. Informational alerts are normal and expected.",
          "type": "timeseries",
