---
# nginx ConfigMap: enable directory autoindex for report browsing
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "glerp-sec-audit.fullname" . }}-nginx-conf
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glerp-sec-audit.labels" . | nindent 4 }}
    app.kubernetes.io/component: report-server
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        charset utf-8;

        location / {
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }

        # Health probe for readiness/liveness
        location /healthz {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "glerp-sec-audit.fullname" . }}-report-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glerp-sec-audit.labels" . | nindent 4 }}
    app.kubernetes.io/component: report-server
spec:
  replicas: {{ .Values.reportServer.replicas }}
  selector:
    matchLabels:
      {{- include "glerp-sec-audit.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: report-server
  template:
    metadata:
      labels:
        {{- include "glerp-sec-audit.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: report-server
    spec:
      containers:
        - name: nginx
          image: {{ .Values.reportServer.image | quote }}
          imagePullPolicy: {{ .Values.reportServer.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.reportServer.resources | nindent 12 }}
          volumeMounts:
            - name: reports
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: {{ include "glerp-sec-audit.fullname" . }}-reports
        - name: nginx-conf
          configMap:
            name: {{ include "glerp-sec-audit.fullname" . }}-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "glerp-sec-audit.fullname" . }}-report-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glerp-sec-audit.labels" . | nindent 4 }}
    app.kubernetes.io/component: report-server
spec:
  type: ClusterIP
  selector:
    {{- include "glerp-sec-audit.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: report-server
  ports:
    - name: http
      port: 80
      targetPort: http
