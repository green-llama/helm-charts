{{- if and .Values.ghcrRegistryAuth.enabled .Values.ghcrRegistryAuth.eso.enabled .Values.ghcrRegistryAuth.eso.createResources }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.ghcrRegistryAuth.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glerp-sec-audit.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ required "ghcrRegistryAuth.eso.clusterSecretStoreName is required when eso.createResources=true" .Values.ghcrRegistryAuth.eso.clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.ghcrRegistryAuth.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.ghcrRegistryAuth.eso.usernameKey }}
      remoteRef:
        key: {{ .Values.ghcrRegistryAuth.secretName }}
        property: {{ .Values.ghcrRegistryAuth.eso.usernameKey }}
    - secretKey: {{ .Values.ghcrRegistryAuth.eso.passwordKey }}
      remoteRef:
        key: {{ .Values.ghcrRegistryAuth.secretName }}
        property: {{ .Values.ghcrRegistryAuth.eso.passwordKey }}
{{- end }}
