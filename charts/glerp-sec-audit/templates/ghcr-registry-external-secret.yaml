{{- if and .Values.ghcrRegistryAuth.enabled .Values.ghcrRegistryAuth.eso.enabled }}
# ExternalSecret: syncs ghcr-pull-secret from the source namespace into the release
# namespace so Trivy scan pods can authenticate to GHCR. Uses ESO's Kubernetes
# provider — the ClusterSecretStore must already exist (see NOTES.txt one-time setup).
# Key names (Username / Password) are preserved identically from the source secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.ghcrRegistryAuth.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glerp-sec-audit.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ required "ghcrRegistryAuth.eso.clusterSecretStoreName is required when eso.enabled=true" .Values.ghcrRegistryAuth.eso.clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.ghcrRegistryAuth.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.ghcrRegistryAuth.eso.usernameKey }}
      remoteRef:
        key: {{ .Values.ghcrRegistryAuth.secretName }}       # source Kubernetes Secret name
        property: {{ .Values.ghcrRegistryAuth.eso.usernameKey }}
    - secretKey: {{ .Values.ghcrRegistryAuth.eso.passwordKey }}
      remoteRef:
        key: {{ .Values.ghcrRegistryAuth.secretName }}
        property: {{ .Values.ghcrRegistryAuth.eso.passwordKey }}
{{- end }}
