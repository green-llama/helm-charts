{{- if and .Values.ghcrRegistryAuth.enabled .Values.ghcrRegistryAuth.eso.enabled }}
# ExternalSecret: syncs GHCR credentials into the release namespace for use by
# Trivy Operator scan jobs (via scanJobAdditionalEnvVars). The ClusterSecretStore
# must already exist; ESO owns the Secret lifecycle (rotation is automatic).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.ghcrRegistryAuth.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glerp-sec-audit.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ required "ghcrRegistryAuth.eso.clusterSecretStoreName is required when eso.enabled=true" .Values.ghcrRegistryAuth.eso.clusterSecretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.ghcrRegistryAuth.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: {{ required "ghcrRegistryAuth.eso.remoteRef.key is required when eso.enabled=true" .Values.ghcrRegistryAuth.eso.remoteRef.key }}
        property: {{ .Values.ghcrRegistryAuth.eso.remoteRef.usernameProperty }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.ghcrRegistryAuth.eso.remoteRef.key }}
        property: {{ .Values.ghcrRegistryAuth.eso.remoteRef.passwordProperty }}
{{- end }}
