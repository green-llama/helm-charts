{{- if .Values.zapScan.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "glerp-sec-audit.fullname" . }}-zap-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "glerp-sec-audit.labels" . | nindent 4 }}
    app.kubernetes.io/component: zap-scan
data:
  # ZAP automation framework config shared by all scan CronJobs.
  # Passed to the scan scripts via -z flag or environment variable.
  zap-options: |
    -config connection.timeoutInSecs=60
    -config scanner.maxScanDurationInMins=60
    -config spider.maxDuration=10
    -config spider.maxDepth=5

  # Report header injected into every HTML report for SOC2 audit identification
  report-header: |
    GLerp Security Scan — Automated CIS/SOC2 Web Application Assessment
    Generated by OWASP ZAP {{ .Values.zapScan.image }}
    Retention: {{ .Values.reports.retentionDays }} days
{{- end }}
