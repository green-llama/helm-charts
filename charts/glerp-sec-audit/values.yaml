# glerp-sec-audit Helm chart values
# Override these per environment:
#   Dev:  helm install glerp-sec-audit . -f values.yaml
#   Prod: helm install glerp-sec-audit . -f values.yaml \
#           --set domain=greenllama.tech \
#           --set reportHostname=security.greenllama.tech \
#           --set externalDnsTarget=pec.greenllama.tech

# ------------------------------------------------------------
# Namespace
# ------------------------------------------------------------
namespace: glerp-sec-audit

# ------------------------------------------------------------
# Scan job priority — applied to kube-bench, ZAP, and Trivy scan pods.
# Value -100 means these jobs are the first to be preempted under
# node pressure and the scheduler treats them as background work.
# ------------------------------------------------------------
scanPriorityClassName: "glerp-sec-audit-scan-low"

# ------------------------------------------------------------
# Ingress / DNS — override per cluster environment
# ingressNamespace: namespace where IngressRoute is deployed.
# Must match where letsencrypt-greenllama-tech-tls lives (traefik-system).
# ------------------------------------------------------------
domain: "dev.greenllama.tech"
reportHostname: "security.dev.greenllama.tech"
reportPort: ""                    # non-standard HTTPS port number only — no colon (e.g. "10443" for dev NAT)
                                  # leave blank for production (standard port 443 is implicit)
externalDnsTarget: "pec.greenllama.tech"
ingressEntrypoint: "websecure"
tlsSecretName: "letsencrypt-greenllama-tech-tls"
ingressNamespace: "traefik-system"

# ------------------------------------------------------------
# GLerp web app scan targets
# Add one entry per GLerp customer instance.
# Running `helm upgrade` after adding a new entry automatically
# creates an additional ZAP CronJob — no other changes required.
# ------------------------------------------------------------
scanTargets:
  - name: backuptest
    url: "https://backuptest.dev.greenllama.tech:10443"

# ------------------------------------------------------------
# kube-bench — CIS Kubernetes Benchmark (node-level)
# Runs as a privileged CronJob mounting host paths for RKE2.
# ------------------------------------------------------------
kubeBench:
  enabled: true
  image: "aquasec/kube-bench:v0.15.0"
  imagePullPolicy: IfNotPresent
  schedule: "0 3 * * 0"       # Weekly: Sunday 03:00 UTC
  benchmark: "rke2-cis-1.7"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ------------------------------------------------------------
# OWASP ZAP — web application scan
# One CronJob is generated per scanTarget entry above.
# full scan = active attack probes (recommended for SOC2 evidence)
# baseline  = passive scan only (faster, lower load on target)
# ------------------------------------------------------------
zapScan:
  enabled: true
  image: "ghcr.io/zaproxy/zaproxy:stable"
  imagePullPolicy: Always
  schedule: "0 2 * * 0"       # Weekly: Sunday 02:00 UTC
  scanType: "baseline"         # baseline = passive only (low load, adequate SOC2 evidence)
                               # full = active attack probes (high load, run manually if needed)
  # ZAP exits 0 even with findings so the Job does not report failure.
  # Findings are reviewed via the HTML report.
  exitOnWarning: false
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# ------------------------------------------------------------
# Reports storage and server
# ------------------------------------------------------------
reports:
  storageSize: "10Gi"
  storageClassName: ""         # leave blank to use cluster default
  accessMode: ReadWriteMany    # RWX required — report-server and scan jobs (kube-bench, ZAP)
                               # mount the same PVC simultaneously; Longhorn supports RWX natively
  retentionDays: 90
  cleanup:
    enabled: true
    schedule: "0 4 * * *"     # Daily at 04:00 UTC — runs after weekly scans have completed

reportServer:
  image: "filebrowser/filebrowser:v2"
  imagePullPolicy: IfNotPresent
  replicas: 1
  branding:
    name: "GLerp Security Reports"
    color: "#27B093"           # GL Mint Green (Pantone 6143 C) — official primary brand color
  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ------------------------------------------------------------
# Trivy Operator sub-chart overrides
# Full reference: https://aquasecurity.github.io/trivy-operator/latest/getting-started/installation/helm/
#
# Mode: ClientServer — a single trivy-server StatefulSet holds the vulnerability
# DB on a shared Longhorn PVC. Scan pods connect to it as thin clients and do NOT
# download the DB themselves, eliminating the ~250 MB per-pod download that caused
# cluster I/O brownout in Standalone mode.
#
# targetNamespaces: "" = scan all namespaces (correct for SOC2 — any GLerp
# customer namespace is automatically included without naming convention).
# excludeNamespaces must be a single-line comma-separated string — block scalars
# fold newlines into spaces which Trivy rejects, silently skipping all exclusions.
# ------------------------------------------------------------
trivy-operator:
  enabled: false    # Set true only on clusters with spare capacity.
                    # Re-enable with: --set trivy-operator.enabled=true
  targetNamespaces: ""
  excludeNamespaces: "kube-system,kube-public,kube-node-lease,cattle-system,cattle-webhook-system,cattle-fleet-system,cattle-fleet-local-system,cattle-provisioning-capi-system,cattle-monitoring-system,cattle-logging-system,cattle-alerting-system,cattle-dashboards,cattle-impersonation-system,fleet-local,fleet-default,rancher-operator-system,traefik-system,cert-manager,longhorn-system,external-secrets,glerp-sec-audit"
  operator:
    builtInTrivyServer: true        # deploys the trivy-server StatefulSet with shared PVC
    scanJobTimeout: "5m"
    scanJobsConcurrentLimit: 1      # correct subchart key — concurrentScanJobsLimit was silently ignored
    vulnerabilityScannerEnabled: true
    configAuditScannerEnabled: false
    rbacAssessmentScannerEnabled: false
    exposedSecretScannerEnabled: false
    complianceScannerEnabled: false
    infraAssessmentScannerEnabled: false
  trivy:
    mode: ClientServer              # scan pods are thin clients; no per-pod DB download
    storageClassName: ""            # uses cluster default (longhorn)
    storageSize: "4Gi"              # vuln DB ~250 MB + Java DB ~400 MB = ~650 MB; 4Gi gives headroom
    skipJavaDBUpdate: false         # Python images share base layers containing Java tooling; cannot skip on first run
    ignoreUnfixed: false
    severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
    slow: true
    priorityClassName: "glerp-sec-audit-scan-low"
    # Scan job pod resources — requests sized to actual usage so the scheduler
    # correctly tracks load; limits cap burst to prevent node saturation.
    resources:
      requests:
        cpu: "200m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    # trivy-server StatefulSet resources — needs more memory to hold the DB in cache
    server:
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
  serviceMonitor:
    enabled: true
  trivyOperator:
    scanJobPodPriorityClassName: "glerp-sec-audit-scan-low"
    scanJobAnnotations: ""
    scanJobNodeSelector: {}
    scanJobTolerations: []
    # GHCR registry credentials — always mounted; optional: true means scan pods start
    # even before ESO has synced the secret. Once ESO creates ghcr-pull-secret, Trivy
    # picks up credentials automatically on the next scan — no operator action required.
    # The secret name matches ghcrRegistryAuth.secretName (ghcr-pull-secret convention).
    #
    # WARNING: scanJobCustomVolumes and scanJobCustomVolumesMount are LISTS.
    # Helm list values DO NOT merge — an override file replaces the entire list.
    # NOTE: volume mounts key is scanJobCustomVolumesMount (singular), NOT
    # scanJobCustomVolumeMounts — trivy-operator 0.32.1 silently ignores the plural form.
    #
    # DO NOT add a "tmp" emptyDir here — trivy-operator v0.32.1 already injects
    # a tmp emptyDir into every scan job internally. Adding one here creates a
    # duplicate volume name that causes the Kubernetes API to reject every scan job.
    scanJobCustomVolumes:
      - name: ghcr-docker-config
        secret:
          secretName: ghcr-pull-secret
          optional: true
          items:
            - key: .dockerconfigjson
              path: config.json
    scanJobCustomVolumesMount:
      - name: ghcr-docker-config
        mountPath: /etc/trivy-registry
        readOnly: true
    scanJobAdditionalEnvVars:
      - name: DOCKER_CONFIG
        value: /etc/trivy-registry

# ------------------------------------------------------------
# Private Registry Auth — GHCR (ghcr.io/green-llama/*)
#
# The source of truth is ghcr-pull-secret in sourceNamespace. ESO syncs
# that secret into this namespace (for Trivy scans) and — when
# clusterExternalSecret is enabled — into every namespace labeled
# glerp.io/private-registry=true (for pod image pulls and Trivy scanning).
#
# New GLerp apps only need: kubectl label namespace <ns> glerp.io/private-registry=true
# No other setup steps to remember.
#
# Requires a ClusterSecretStore (Kubernetes provider) pointing at sourceNamespace.
# See NOTES.txt: "Setup — Private Registry (GHCR) Scanning" for the one-time
# cluster-level prerequisites and the full values block to uncomment.
# ------------------------------------------------------------
ghcrRegistryAuth:
  enabled: false
  secretName: "ghcr-pull-secret"        # identical across all namespaces — signals same source

  eso:
    enabled: false
    createResources: false               # set true once ESO CRDs are confirmed present;
                                         # bypasses unreliable .Capabilities check in Rancher Helm
    clusterSecretStoreName: "k8s-ghcr-source"  # name to assign to the ClusterSecretStore
    sourceNamespace: "glerp-ai-intake-sandbox"  # namespace where ghcr-pull-secret lives
                                         # override per environment: prod uses a different namespace
    # ESO controller install coordinates — used to generate RBAC in NOTES.txt.
    # Adjust if ESO was installed in a non-standard namespace or with a different SA name.
    controllerNamespace: "external-secrets"
    controllerServiceAccount: "external-secrets"

    # ------------------------------------------------------------------
    # ClusterExternalSecret — zero-touch distribution to all labeled namespaces.
    # ESO creates ghcr-pull-secret in every namespace matching the selector.
    # New apps need only: kubectl label namespace <ns> glerp.io/private-registry=true
    # ------------------------------------------------------------------
    clusterExternalSecret:
      enabled: false
      namespaceSelector:
        matchLabels:
          glerp.io/private-registry: "true"

# ------------------------------------------------------------
# Grafana dashboard
# Rancher's Grafana sidecar (grafana-sc-dashboard) watches cattle-dashboards
# for ConfigMaps labeled grafana_dashboard: "1". Match the pattern from
# glerp-monitoring. Set enabled: false to skip dashboard creation.
# ------------------------------------------------------------
grafanaDashboard:
  enabled: true
  namespace: "cattle-dashboards"
  dashboardLabel: "1"
  folderName: "GLerp Security"

# ------------------------------------------------------------
# Prometheus Pushgateway sub-chart overrides
# Used to receive kube-bench metrics after each weekly run.
# ------------------------------------------------------------
prometheus-pushgateway:
  replicaCount: 1
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
  serviceMonitor:
    enabled: true
    namespace: ""              # defaults to release namespace
  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"
