# glerp-sec-audit Helm chart values
# Override these per environment:
#   Dev:  helm install glerp-sec-audit . -f values.yaml
#   Prod: helm install glerp-sec-audit . -f values.yaml \
#           --set domain=greenllama.tech \
#           --set reportHostname=security.greenllama.tech \
#           --set externalDnsTarget=pec.greenllama.tech

# ------------------------------------------------------------
# Namespace
# ------------------------------------------------------------
namespace: glerp-sec-audit

# ------------------------------------------------------------
# Ingress / DNS — override per cluster environment
# ingressNamespace: namespace where IngressRoute is deployed.
# Must match where letsencrypt-greenllama-tech-tls lives (traefik-system).
# ------------------------------------------------------------
domain: "dev.greenllama.tech"
reportHostname: "security.dev.greenllama.tech"
externalDnsTarget: "pec.greenllama.tech"
ingressEntrypoint: "websecure"
tlsSecretName: "letsencrypt-greenllama-tech-tls"
ingressNamespace: "traefik-system"

# ------------------------------------------------------------
# GLerp web app scan targets
# Add one entry per GLerp customer instance.
# Running `helm upgrade` after adding a new entry automatically
# creates an additional ZAP CronJob — no other changes required.
# ------------------------------------------------------------
scanTargets:
  - name: backuptest
    url: "https://backuptest.dev.greenllama.tech:10443"

# ------------------------------------------------------------
# kube-bench — CIS Kubernetes Benchmark (node-level)
# Runs as a privileged CronJob mounting host paths for RKE2.
# ------------------------------------------------------------
kubeBench:
  enabled: true
  image: "aquasec/kube-bench:v0.15.0"
  imagePullPolicy: IfNotPresent
  schedule: "0 3 * * 0"       # Weekly: Sunday 03:00 UTC
  benchmark: "rke2-cis-1.7"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ------------------------------------------------------------
# OWASP ZAP — web application scan
# One CronJob is generated per scanTarget entry above.
# full scan = active attack probes (recommended for SOC2 evidence)
# baseline  = passive scan only (faster, lower load on target)
# ------------------------------------------------------------
zapScan:
  enabled: true
  image: "ghcr.io/zaproxy/zaproxy:stable"
  imagePullPolicy: Always
  schedule: "0 2 * * 0"       # Weekly: Sunday 02:00 UTC
  scanType: "baseline"         # baseline = passive only (low load, adequate SOC2 evidence)
                               # full = active attack probes (high load, run manually if needed)
  # ZAP exits 0 even with findings so the Job does not report failure.
  # Findings are reviewed via the HTML report.
  exitOnWarning: false
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

# ------------------------------------------------------------
# Reports storage and server
# ------------------------------------------------------------
reports:
  storageSize: "10Gi"
  storageClassName: ""         # leave blank to use cluster default
  retentionDays: 90

reportServer:
  image: "nginx:alpine"
  imagePullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ------------------------------------------------------------
# Trivy Operator sub-chart overrides
# Full reference: https://aquasecurity.github.io/trivy-operator/latest/getting-started/installation/helm/
# targetNamespaces: "" = scan all namespaces (correct for SOC2 — any GLerp
# customer namespace is automatically included without naming convention)
# ------------------------------------------------------------
trivy-operator:
  targetNamespaces: ""
  # Exclude all Rancher/RKE2 system namespaces — scanning these causes Rancher GUI
  # brownouts and produces no SOC2-relevant evidence (not GLerp workloads).
  excludeNamespaces: >-
    kube-system,kube-public,kube-node-lease,
    cattle-fleet-system,cattle-fleet-local-system,cattle-provisioning-capi-system,
    cattle-monitoring-system,cattle-logging-system,cattle-alerting-system,
    cattle-dashboards,cattle-impersonation-system,
    fleet-local,fleet-default,
    rancher-operator-system,
    traefik-system,
    cert-manager,
    longhorn-system,
    glerp-sec-audit
  operator:
    scanJobTimeout: "5m"
    concurrentScanJobsLimit: "2"  # conservative for single-node dev; raise to 5 on multi-node prod
    vulnerabilityScannerEnabled: true
    configAuditScannerEnabled: true
    rbacAssessmentScannerEnabled: true
    exposedSecretScannerEnabled: true
    complianceScannerEnabled: false  # cluster-wide compliance scan is very heavy; CIS evidence
                                     # comes from kube-bench instead
    infraAssessmentScannerEnabled: false  # kube-bench covers CIS node compliance; node-collector
                                          # cannot schedule on RKE2 worker nodes due to affinity mismatch
  trivy:
    ignoreUnfixed: false
    severity: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"
    slow: true                 # reduce memory pressure during scans
  compliance:
    reportType: "summary"      # summary only; detail reports are very large
  serviceMonitor:
    enabled: true              # Prometheus ServiceMonitor for Trivy metrics
  trivyOperator:
    scanJobAnnotations: ""
    scanJobNodeSelector: {}
    scanJobTolerations: []

# ------------------------------------------------------------
# Grafana dashboard
# Rancher's Grafana sidecar (grafana-sc-dashboard) watches cattle-dashboards
# for ConfigMaps labeled grafana_dashboard: "1". Match the pattern from
# glerp-monitoring. Set enabled: false to skip dashboard creation.
# ------------------------------------------------------------
grafanaDashboard:
  enabled: true
  namespace: "cattle-dashboards"
  dashboardLabel: "1"
  folderName: "GLerp Security"

# ------------------------------------------------------------
# Prometheus Pushgateway sub-chart overrides
# Used to receive kube-bench metrics after each weekly run.
# ------------------------------------------------------------
prometheus-pushgateway:
  replicaCount: 1
  serviceMonitor:
    enabled: true
    namespace: ""              # defaults to release namespace
  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"
