{{- if .Values.victoriaMetrics.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-victoriametrics
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "glerp-storage-monitor.labels" . | nindent 4 }}
  annotations:
    # Retain PVC on helm uninstall — 90 days of metrics are worth preserving.
    "helm.sh/resource-policy": keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.victoriaMetrics.storage.size }}
  {{- if .Values.victoriaMetrics.storage.storageClass }}
  storageClassName: {{ .Values.victoriaMetrics.storage.storageClass }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-victoriametrics
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "glerp-storage-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoriametrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glerp-storage-monitor
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: victoriametrics
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glerp-storage-monitor
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: victoriametrics
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:{{ .Values.victoriaMetrics.imageTag }}
          args:
            - -storageDataPath=/storage
            - -retentionPeriod={{ .Values.victoriaMetrics.retention }}
            - -httpListenAddr=:8428
            - -selfScrapeInterval=0
          ports:
            - name: http
              containerPort: 8428
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.victoriaMetrics.resources | nindent 12 }}
          volumeMounts:
            - name: storage
              mountPath: /storage
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-victoriametrics
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-victoriametrics
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "glerp-storage-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoriametrics
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8428
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: glerp-storage-monitor
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: victoriametrics
{{- end }}
