name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

# Only one release can deploy to GitHub Pages at a time.
# cancel-in-progress: false means newer runs wait rather than cancel,
# so every version bump is published even when pushes arrive in a burst.
concurrency:
  group: pages
  cancel-in-progress: false

# Forward-compatible with GitHub's Node.js 24 enforcement (June 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases and push to gh-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # chart-releaser needs full history to detect changed charts

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        # Direct install avoids the azure/setup-helm Node.js 20 action dependency.
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Update chart dependencies
        run: |
          set -euo pipefail
          # Generic: discover every http(s) dependency repo declared across all charts and
          # add it once. OCI dependencies (oci://...) need no `helm repo add` and resolve
          # natively at `helm dependency update`. Charts with no dependencies are a no-op.
          # This lets new charts (e.g. glerp: bitnami + dragonfly-OCI) publish without
          # editing this workflow.
          mapfile -t repos < <(
            for f in charts/*/Chart.yaml; do
              # emit each http(s) dependency repository URL (any indentation depth —
              # charts use either "  - name" (2-space) or "  repository" list styles)
              awk '/^[[:space:]]*repository:[[:space:]]/ {gsub(/"/,"",$2); if ($2 ~ /^https?:\/\//) print $2}' "$f"
            done | sort -u
          )
          for url in "${repos[@]:-}"; do
            [ -z "$url" ] && continue
            # deterministic, collision-free local repo alias from the URL host+path hash
            name="dep-$(printf '%s' "$url" | sha1sum | cut -c1-10)"
            helm repo add "$name" "$url" || true
          done
          helm repo update || true
          for dir in charts/*/; do
            if [ -f "${dir}/Chart.yaml" ]; then
              helm dependency update "${dir}"
            fi
          done

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: charts
          skip_existing: true        # safe to re-run; won't re-release an existing version
          mark_as_latest: true
