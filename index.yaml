    dependencies:
    - alias: blackbox-exporter
      condition: blackbox-exporter.enabled
      name: prometheus-blackbox-exporter
      repository: https://prometheus-community.github.io/helm-charts
      version: 9.4.0
    - condition: trivy-operator.enabled
      name: trivy-operator
      repository: https://aquasecurity.github.io/helm-charts/
      version: 0.32.1
    - condition: prometheus-pushgateway.enabled
      name: prometheus-pushgateway
      repository: https://prometheus-community.github.io/helm-charts
      version: 2.14.0
    description: 'Unified observability for GLerp RKE2 clusters. Covers uptime/SLA
      probing (Blackbox Exporter), storage utilization (Longhorn, MinIO, DirectPV,
      node filesystems), and security compliance (Trivy CVE scanning, kube-bench CIS,
      OWASP ZAP). Includes shared VictoriaMetrics (90-day retention), unified AlertManager
      routing, and nine Grafana dashboards. New sites auto-discovered by labeling
      their Kubernetes Service. '
