    description: 'Uptime monitoring for GLerp (ERPNext v16) sites and ISP connectivity.
      Includes Prometheus Blackbox Exporter, VictoriaMetrics long-term storage (90d),
      alert rules, AlertManager email/Telegram/Slack routing, maintenance window admin,
