apiVersion: v1
entries:
  glerp-documenso:
  - apiVersion: v2
    appVersion: v1.8.1
    created: "2026-05-18T22:35:18.164650273Z"
    description: A Helm chart for Documenso — green-llama infrastructure edition (Traefik
      IngressRoute + external-dns)
    digest: f1b86b558d8e769f950bb8822f212a48e6d999436e0591acee0e94897f461ae0
    icon: https://raw.githubusercontent.com/green-llama/helm-charts/main/icons/glerp-documenso.svg
    name: glerp-documenso
    type: application
    urls:
    - https://github.com/green-llama/helm-charts/releases/download/glerp-documenso-1.1.0/glerp-documenso-1.1.0.tgz
    version: 1.1.0
  glerp-monitoring:
  - apiVersion: v2
    appVersion: "2026.06"
    created: "2026-05-30T16:12:56.174756168Z"
    dependencies:
    - alias: blackbox-exporter
      condition: blackbox-exporter.enabled
      name: prometheus-blackbox-exporter
      repository: https://prometheus-community.github.io/helm-charts
      version: 9.4.0
    - condition: trivy-operator.enabled
      name: trivy-operator
      repository: https://aquasecurity.github.io/helm-charts/
      version: 0.32.1
    - condition: prometheus-pushgateway.enabled
      name: prometheus-pushgateway
      repository: https://prometheus-community.github.io/helm-charts
      version: 2.14.0
    description: 'Unified observability for GLerp RKE2 clusters. Covers uptime/SLA
      probing (Blackbox Exporter), storage utilization (Longhorn, MinIO, DirectPV,
      node filesystems), and security compliance (Trivy CVE scanning, kube-bench CIS,
      OWASP ZAP). Includes shared VictoriaMetrics (90-day retention), unified AlertManager
      routing, and nine Grafana dashboards. New sites auto-discovered by labeling
      their Kubernetes Service. '
