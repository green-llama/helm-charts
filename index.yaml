  glerp-monitoring:
  - apiVersion: v2
    appVersion: 1.0.0
    created: "2026-05-21T23:50:40.969778494Z"
    dependencies:
    - alias: blackbox-exporter
      condition: blackbox-exporter.enabled
      name: prometheus-blackbox-exporter
      repository: https://prometheus-community.github.io/helm-charts
      version: 9.4.0
    description: 'Uptime monitoring for GLerp (ERPNext v16) sites and ISP connectivity.
      Includes Prometheus Blackbox Exporter, VictoriaMetrics long-term storage (90d),
      alert rules, AlertManager email/Telegram/Slack routing, maintenance window admin,
      and four Grafana dashboards (Uptime Overview, SLA Compliance, Internet Connectivity,
      Customer SLA Report). New sites are discovered automatically by labeling their
      Kubernetes Service. '
