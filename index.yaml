      name: prometheus-blackbox-exporter
      repository: https://prometheus-community.github.io/helm-charts
      version: 9.4.0
    description: 'Uptime monitoring for GLerp (ERPNext v16) sites and ISP connectivity.
      Includes Prometheus Blackbox Exporter, VictoriaMetrics long-term storage (90d),
      alert rules, AlertManager email routing, and three Grafana dashboards (Uptime
