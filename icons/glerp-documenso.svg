<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: GLerp dark forest green -->
  <rect width="512" height="512" rx="72" fill="#00534c"/>

  <!-- Document STORAGE: two back sheets offset behind the front doc (a managed stack). -->
  <rect x="176" y="86" width="180" height="236" rx="18"
        fill="none" stroke="white" stroke-width="12" opacity="0.35"
        transform="rotate(8 266 204)"/>
  <rect x="164" y="90" width="184" height="240" rx="18"
        fill="#00534c" stroke="white" stroke-width="12" opacity="0.6"
        transform="rotate(3 256 210)"/>

  <!-- Front document body with folded corner (the sheet being signed). -->
  <path d="M132,96 L286,96 L344,154 L344,392
           C344,406 332,416 318,416
           L146,416 C132,416 132,406 132,392 Z"
        fill="rgba(255,255,255,0.10)"
        stroke="white" stroke-width="16" stroke-linejoin="round"/>
  <path d="M286,96 L286,154 L344,154"
        fill="none" stroke="white" stroke-width="16" stroke-linejoin="round"/>

  <!-- Content lines -->
  <line x1="164" y1="196" x2="312" y2="196" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.45"/>
  <line x1="164" y1="228" x2="292" y2="228" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.45"/>

  <!-- eSIGNATURE: signing line + flourish in teal -->
  <line x1="156" y1="356" x2="300" y2="356" stroke="#27b093" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <path d="M158,344 Q178,320 200,340 Q222,360 246,330 Q266,308 288,328 Q302,340 314,332"
        fill="none" stroke="#27b093" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Signing pen nib pointing at the flourish -->
  <path d="M330,300 L360,270 L372,282 L342,312 L326,316 Z"
        fill="#27b093" stroke="white" stroke-width="5" stroke-linejoin="round"/>

  <!-- GL badge -->
  <circle cx="416" cy="416" r="52" fill="white"/>
  <text x="416" y="432" text-anchor="middle"
        font-family="Inter, 'Inter Display', Arial, sans-serif"
        font-weight="700" font-size="32" fill="#00534c">GL</text>
</svg>
