<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- glerp-documenso: document storage + e-signature. Forest-green tile, white sheet
       (matching the glerp wordmark pill), teal signature + a "signed/verified" check seal. -->
  <rect width="512" height="512" rx="72" fill="#00534c"/>

  <!-- Document STORAGE: two back sheets offset behind the front doc (a managed stack). -->
  <rect x="176" y="96" width="176" height="232" rx="20" fill="#ffffff" opacity="0.30"
        transform="rotate(7 264 212)"/>
  <rect x="166" y="100" width="180" height="236" rx="20" fill="#ffffff" opacity="0.55"
        transform="rotate(3 256 218)"/>

  <!-- Front white document with folded corner. -->
  <path d="M128,104 L278,104 L336,162 L336,392
           C336,405 326,414 314,414 L150,414 C138,414 128,405 128,392 Z"
        fill="#ffffff"/>

  <!-- Content lines (faint green). -->
  <line x1="160" y1="196" x2="300" y2="196" stroke="#00534c" stroke-width="12" stroke-linecap="round" opacity="0.20"/>
  <line x1="160" y1="230" x2="276" y2="230" stroke="#00534c" stroke-width="12" stroke-linecap="round" opacity="0.20"/>

  <!-- eSIGNATURE: flourish + signing line in teal. -->
  <path d="M150,320 Q172,296 196,318 Q220,340 244,310 Q264,290 286,310"
        fill="none" stroke="#27b093" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="150" y1="352" x2="300" y2="352" stroke="#27b093" stroke-width="7" stroke-linecap="round" opacity="0.6"/>

  <!-- Signed / verified seal. -->
  <circle cx="360" cy="360" r="56" fill="#27b093" stroke="#ffffff" stroke-width="8"/>
  <path d="M336,360 L353,378 L386,342" fill="none" stroke="#ffffff" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
