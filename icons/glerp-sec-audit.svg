<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: GLerp dark forest green -->
  <rect width="512" height="512" rx="72" fill="#00534c"/>

  <!-- Shield: kube-bench CIS compliance + security audit -->
  <path d="M118,118 L256,78 L394,118 L394,252
           C394,338 328,402 256,432
           C184,402 118,338 118,252 Z"
        fill="rgba(255,255,255,0.08)"
        stroke="white" stroke-width="22"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Checkmark inside shield -->
  <polyline points="186,252 232,300 328,194"
            fill="none" stroke="white" stroke-width="28"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Teal accent: three dots below shield representing scan layers -->
  <circle cx="220" cy="448" r="10" fill="#27b093" opacity="0.7"/>
  <circle cx="256" cy="448" r="10" fill="#27b093"/>
  <circle cx="292" cy="448" r="10" fill="#27b093" opacity="0.7"/>

  <!-- GL badge: brand identity bottom-right -->
  <circle cx="414" cy="414" r="54" fill="white"/>
  <text x="414" y="430" text-anchor="middle"
        font-family="Inter, 'Inter Display', Arial, sans-serif"
        font-weight="700" font-size="34" fill="#00534c">GL</text>
</svg>
