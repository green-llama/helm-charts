<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- GLerp brand tile: forest-green square with the GLerp wordmark on a white pill.
       Wordmark colors per brand: "GL" #00534c (dark forest green), "erp" #27b093 (teal),
       Inter Display Medium. -->
  <rect width="512" height="512" rx="72" fill="#00534c"/>

  <!-- white pill panel -->
  <rect x="56" y="176" width="400" height="160" rx="40" fill="#ffffff"/>

  <!-- GLerp wordmark -->
  <text x="256" y="258" text-anchor="middle" dominant-baseline="central"
        font-family="'Inter Display', Inter, Arial, sans-serif" font-weight="500" font-size="112">
    <tspan fill="#00534c">GL</tspan><tspan fill="#27b093">erp</tspan>
  </text>
</svg>
