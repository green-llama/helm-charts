{{- if .Values.victoriaMetrics.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-storage-datasource
  namespace: {{ .Values.grafana.datasourceNamespace }}
  labels:
    {{- include "glerp-storage-monitor.labels" . | nindent 4 }}
    grafana_datasource: {{ .Values.grafana.datasourceLabel | quote }}
data:
  glerp-storage-victoriametrics.yaml: |
    apiVersion: 1
    datasources:
      - name: GLerp — VictoriaMetrics
        uid: glerp-vm
        type: prometheus
        url: {{ include "glerp-storage-monitor.vmUrl" . }}
        access: proxy
        isDefault: false
        editable: false
        jsonData:
          timeInterval: "60s"
          queryTimeout: "60s"
          httpMethod: POST
{{- end }}
