---
# IngressRoute in traefik-system so it can access letsencrypt-greenllama-tech-tls directly.
# filebrowser handles the /security prefix internally via baseURL — no StripPrefix middleware needed.
# Service is referenced cross-namespace.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "glerp-sec-audit.fullname" . }}-report-server
  namespace: {{ .Values.ingressNamespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.reportHostname | quote }}
    external-dns.alpha.kubernetes.io/target: {{ .Values.externalDnsTarget | quote }}
  labels:
    {{- include "glerp-sec-audit.labels" . | nindent 4 }}
    app.kubernetes.io/component: report-server
spec:
  entryPoints:
    - {{ .Values.ingressEntrypoint }}
  routes:
    - match: Host(`{{ .Values.reportHostname }}`) && PathPrefix(`/security`)
      kind: Rule
      services:
        - name: {{ include "glerp-sec-audit.fullname" . }}-report-server
          namespace: {{ .Release.Namespace }}
          port: 80
          scheme: http
  tls:
    secretName: {{ .Values.tlsSecretName | quote }}
