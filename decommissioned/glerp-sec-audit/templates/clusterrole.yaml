apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "glerp-sec-audit.fullname" . }}-scanner
  labels:
    {{- include "glerp-sec-audit.labels" . | nindent 4 }}
    app.kubernetes.io/component: kube-bench
rules:
  # kube-bench needs broad read access to inspect cluster configuration
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - configmaps
      - serviceaccounts
      - endpoints
      - services
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources:
      - nodes/proxy
    verbs: ["get"]
  # Inspect RBAC configuration for CIS benchmark checks
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterroles
      - clusterrolebindings
      - roles
      - rolebindings
    verbs: ["get", "list"]
  # Inspect network policies
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
    verbs: ["get", "list"]
  # Inspect pod security policies / admission config
  - apiGroups: ["policy"]
    resources:
      - podsecuritypolicies
    verbs: ["get", "list"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - mutatingwebhookconfigurations
      - validatingwebhookconfigurations
    verbs: ["get", "list"]
